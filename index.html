<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>番薯钟</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍠</text></svg>" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: radial-gradient(135% 95% at 50% -12%, #2A2820 0%, #1C1B17 56%) fixed; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", system-ui, sans-serif; }
    button, input, textarea, select { font-family: inherit; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=range] { cursor: pointer; }
    button { border: none; cursor: pointer; }
    input { border: none; }
    .btn-press { transition: transform .1s; }
    .btn-press:active { transform: scale(0.9); }
    .btn-press-sm { transition: transform .1s; }
    .btn-press-sm:active { transform: scale(0.95); }
    .preset-chip { transition: color .15s, border-color .15s; }
    .preset-chip:hover { color: #D2613C !important; border-color: #D2613C !important; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    const ORANGE = "#D2613C";
    const BG = "#1C1B17";
    const CARD = "#27261F";
    const BTN = "#2F2E27";
    const TEXT_DIM = "#8E8C84";
    const FONT = '-apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", system-ui, sans-serif';
    const glass = { background:"rgba(38,37,30,0.5)", backdropFilter:"blur(20px) saturate(120%)", WebkitBackdropFilter:"blur(20px) saturate(120%)", border:"1px solid rgba(255,255,255,0.08)" };
    const RING_R = 116;
    const RING_C = 2 * Math.PI * RING_R;
    const ALERT_GROUPS = [0, 1.1, 2.2];

    const todayStr = () => {
      const d = new Date();
      return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
    };

    const fmtShortDate = (dateStr, timeStr) => {
      const [, m, day] = dateStr.split("-");
      return `${String(m).padStart(2,"0")}-${String(day).padStart(2,"0")} ${timeStr}`;
    };

    const fmtDuration = (min) => {
      if (min < 60) return `${min}m`;
      const h = Math.floor(min / 60);
      const rem = min % 60;
      return rem === 0 ? `${h}h` : `${h}h${rem}m`;
    };

    const fmtTotalCN = (min) => {
      if (min <= 0) return "0分钟";
      const h = Math.floor(min / 60);
      const m = min % 60;
      if (h === 0) return `${m}分钟`;
      if (m === 0) return `${h}小时`;
      return `${h}小时${m}分钟`;
    };

    const ICONS = {
      Play: [["polygon",{points:"6 3 20 12 6 21 6 3"}]],
      Pause: [["rect",{x:"14",y:"4",width:"4",height:"16",rx:"1"}],["rect",{x:"6",y:"4",width:"4",height:"16",rx:"1"}]],
      RotateCcw: [["path",{d:"M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"}],["path",{d:"M3 3v5h5"}]],
      Volume2: [["polygon",{points:"11 5 6 9 2 9 2 15 6 15 11 19 11 5"}],["path",{d:"M15.54 8.46a5 5 0 0 1 0 7.07"}],["path",{d:"M19.07 4.93a10 10 0 0 1 0 14.14"}]],
      VolumeX: [["polygon",{points:"11 5 6 9 2 9 2 15 6 15 11 19 11 5"}],["line",{x1:"22",x2:"16",y1:"9",y2:"15"}],["line",{x1:"16",x2:"22",y1:"9",y2:"15"}]],
      Lock: [["rect",{width:"18",height:"11",x:"3",y:"11",rx:"2",ry:"2"}],["path",{d:"M7 11V7a5 5 0 0 1 10 0v4"}]],
      ChevronDown: [["path",{d:"m6 9 6 6 6-6"}]],
      ChevronUp: [["path",{d:"m18 15-6-6-6 6"}]],
      Trash2: [["path",{d:"M3 6h18"}],["path",{d:"M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"}],["path",{d:"M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"}],["line",{x1:"10",x2:"10",y1:"11",y2:"17"}],["line",{x1:"14",x2:"14",y1:"11",y2:"17"}]],
    };
    const LucideIcon = ({ data, size = 24, color = "currentColor", style }) =>
      data ? React.createElement(
        "svg",
        { xmlns:"http://www.w3.org/2000/svg", width:size, height:size, viewBox:"0 0 24 24",
          fill:"none", stroke:color, strokeWidth:2, strokeLinecap:"round", strokeLinejoin:"round", style },
        data.map(([tag, attrs], i) => React.createElement(tag, { key:i, ...attrs }))
      ) : null;
    const mkIcon = (name) => (props) => React.createElement(LucideIcon, { data: ICONS[name], ...props });

    const Clawd = () => {
      const seed = useMemo(() => Math.random(), []);
      return React.createElement(React.Fragment, null,
        React.createElement("style", null, `
          @keyframes clawd-walk {
            0% { transform: translateX(-90px); }
            100% { transform: translateX(calc(100vw + 90px)); }
          }
          @keyframes clawd-bob {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
          }
          @keyframes snipL {
            0%   { transform: rotate(0deg); }
            20%  { transform: rotate(-18deg); }
            50%  { transform: rotate(-18deg); }
            100% { transform: rotate(0deg); }
          }
          @keyframes snipR {
            0%   { transform: rotate(0deg); }
            20%  { transform: rotate(18deg); }
            50%  { transform: rotate(18deg); }
            100% { transform: rotate(0deg); }
          }
          @keyframes crab-spin {
            0%, 100% { transform: rotate(0deg); }
            10%      { transform: rotate(10deg); }
            20%      { transform: rotate(10deg); }
            30%      { transform: rotate(0deg); }
          }
          .clawd-walk {
            animation: clawd-walk 40s linear infinite;
            will-change: transform;
          }
          .clawd-bob {
            animation: clawd-bob 0.5s ease-in-out infinite;
            will-change: transform;
          }
          .clawd-spin {
            animation: crab-spin 8s ease-in-out infinite;
            animation-delay: calc(-8s * var(--seed, 0));
            will-change: transform;
          }
          .claw {
            transform-box: fill-box;
          }
          .claw-l {
            transform-origin: 90% 85%;
            animation: snipL 1.3s ease-in-out infinite;
          }
          .claw-r {
            transform-origin: 10% 85%;
            animation: snipR 1.3s ease-in-out infinite;
            animation-delay: 0.4s;
          }
          @keyframes blink {
            0%, 88%, 100% { transform: scaleY(1); }
            93%           { transform: scaleY(0.1); }
          }
          .eye {
            transform-box: fill-box;
            transform-origin: center center;
            animation: blink 3.5s ease-in-out infinite;
          }
        `),
        React.createElement("div", {
          className: "clawd-walk",
          style: { position:"fixed", bottom:6, left:0, zIndex:9999, pointerEvents:"none", opacity:0.9 }
        },
          React.createElement("div", { className: "clawd-bob" },
            React.createElement("div", {
              className: "clawd-spin",
              style: { '--seed': seed }
            },
              React.createElement("svg", { width:"78", height:"65", viewBox:"0 0 24 20", shapeRendering:"crispEdges" },
                React.createElement("g", { className: "claw claw-l" },
                  React.createElement("rect", { x:"0", y:"3", width:"4", height:"2", fill:"#E2795B" }),
                  React.createElement("rect", { x:"0", y:"6", width:"4", height:"1", fill:"#E2795B" }),
                  React.createElement("rect", { x:"2", y:"5", width:"3", height:"3", fill:"#D2613C" })
                ),
                React.createElement("g", { className: "claw claw-r" },
                  React.createElement("rect", { x:"20", y:"3", width:"4", height:"2", fill:"#E2795B" }),
                  React.createElement("rect", { x:"20", y:"6", width:"4", height:"1", fill:"#E2795B" }),
                  React.createElement("rect", { x:"19", y:"5", width:"3", height:"3", fill:"#D2613C" })
                ),
                React.createElement("rect", { x:"5", y:"7", width:"1", height:"2", fill:"#C05B3F" }),
                React.createElement("rect", { x:"18", y:"7", width:"1", height:"2", fill:"#C05B3F" }),
                React.createElement("rect", { x:"7", y:"8", width:"10", height:"1", fill:"#E2795B" }),
                React.createElement("rect", { x:"6", y:"9", width:"12", height:"6", fill:"#E2795B" }),
                React.createElement("rect", { x:"7", y:"15", width:"10", height:"1", fill:"#D2613C" }),
                React.createElement("g", { className: "eye" },
                  React.createElement("rect", { x:"9", y:"10", width:"2", height:"2", fill:"#FFFFFF" }),
                  React.createElement("rect", { x:"10", y:"11", width:"1", height:"1", fill:"#1C1B17" })
                ),
                React.createElement("g", { className: "eye" },
                  React.createElement("rect", { x:"13", y:"10", width:"2", height:"2", fill:"#FFFFFF" }),
                  React.createElement("rect", { x:"14", y:"11", width:"1", height:"1", fill:"#1C1B17" })
                ),
                React.createElement("rect", { x:"11", y:"13", width:"2", height:"1", fill:"#C05B3F" }),
                React.createElement("rect", { x:"7", y:"16", width:"1", height:"2", fill:"#C05B3F" }),
                React.createElement("rect", { x:"10", y:"16", width:"1", height:"2", fill:"#C05B3F" }),
                React.createElement("rect", { x:"13", y:"16", width:"1", height:"2", fill:"#C05B3F" }),
                React.createElement("rect", { x:"16", y:"16", width:"1", height:"2", fill:"#C05B3F" })
              )
            )
          )
        )
      );
    };

    function PomodoroApp() {
      const [mode, setMode] = useState("work");
      const [workStr, setWorkStr] = useState("25");
      const [breakStr, setBreakStr] = useState("5");
      const [timeLeft, setTimeLeft] = useState(25 * 60);
      const [total, setTotal] = useState(25 * 60);
      const [running, setRunning] = useState(false);
      const [locked, setLocked] = useState(false);
      const [muted, setMuted] = useState(false);
      const [volume, setVolume] = useState(0.3);
      const [noiseType, setNoiseType] = useState("rain");
      const [count, setCount] = useState(0);
      const [task, setTask] = useState("");
      const [history, setHistory] = useState([]);
      const [showHistory, setShowHistory] = useState(false);
      const [showResetConfirm, setShowResetConfirm] = useState(false);
      const [flashKey, setFlashKey] = useState(0);
      const [showPlusOne, setShowPlusOne] = useState(false);

      const audio = useRef({ ctx:null, sources:[], masterGain:null, dropTimer:null, buffers:{}, noiseId:0 });
      const endRef = useRef(null);
      const mutedRef = useRef(muted); mutedRef.current = muted;
      const volRef = useRef(volume); volRef.current = volume;
      const modeRef = useRef(mode); modeRef.current = mode;
      const flashTimersRef = useRef([]);
      const prevVolRef = useRef(0.3);

      const parseMin = (s, fb) => { const n = parseInt(s,10); return Number.isFinite(n)&&n>=1 ? Math.min(180,n) : fb; };
      const workMin = parseMin(workStr, 25);
      const breakMin = parseMin(breakStr, 5);
      const curDuration = (mode==="work" ? workMin : breakMin) * 60;

      const activeWorkMinRef = useRef(workMin);
      const endMetaRef = useRef({ mode, task, workMin, breakMin });
      endMetaRef.current = { mode, task, workMin, breakMin };

      // 同步创建/恢复 ctx（用于短音效，无需等待）
      const getCtx = useCallback(() => {
        const a = audio.current;
        if (!a.ctx) a.ctx = new (window.AudioContext||window.webkitAudioContext)();
        if (a.ctx.state==="suspended") a.ctx.resume().catch(()=>{});
        return a.ctx;
      }, []);

      // 异步确保 ctx 已恢复（用于持续噪音，必须等待）
      const ensureCtx = useCallback(async () => {
        const a = audio.current;
        if (!a.ctx) a.ctx = new (window.AudioContext||window.webkitAudioContext)();
        if (a.ctx.state === "suspended") {
          await a.ctx.resume();
        }
        return a.ctx;
      }, []);

      const makeBuffer = useCallback((type) => {
        const ctx = getCtx(); const len = ctx.sampleRate*2;
        const buf = ctx.createBuffer(1,len,ctx.sampleRate); const d = buf.getChannelData(0);
        if (type==="white") { for (let i=0;i<len;i++) d[i]=Math.random()*2-1; }
        else if (type==="brown") { let last=0; for (let i=0;i<len;i++){const w=Math.random()*2-1;last=(last+0.02*w)/1.02;d[i]=last*3.5;} }
        else { let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0; for(let i=0;i<len;i++){const w=Math.random()*2-1;b0=0.99886*b0+w*0.0555179;b1=0.99332*b1+w*0.0750759;b2=0.969*b2+w*0.153852;b3=0.8665*b3+w*0.3104856;b4=0.55*b4+w*0.5329522;b5=-0.7616*b5-w*0.016898;d[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11;b6=w*0.115926;} }
        return buf;
      }, [getCtx]);

      const getBuf = useCallback((t) => { const a=audio.current; if(!a.buffers[t]) a.buffers[t]=makeBuffer(t); return a.buffers[t]; }, [makeBuffer]);

      // 预热 buffer，避免首次播放时主线程卡顿
      useEffect(() => {
        const timer = setTimeout(() => {
          try {
            getBuf("pink");
            getBuf("brown");
            getBuf("white");
          } catch (e) {}
        }, 200);
        return () => clearTimeout(timer);
      }, [getBuf]);

      const stopNoise = useCallback(() => {
        const a=audio.current; a.sources.forEach(s=>{try{s.stop();}catch(e){}});
        a.sources=[]; a.masterGain=null;
        if(a.dropTimer){clearInterval(a.dropTimer);a.dropTimer=null;}
      }, []);

      const startNoise = useCallback(async (type) => {
        if (modeRef.current==="break") return;
        const a = audio.current;
        const id = ++a.noiseId;        // 防止快速点击导致的竞态
        await ensureCtx();              // 等待 AudioContext 真正 running
        if (id !== a.noiseId) return;   // 此调用已被后续操作取消

        stopNoise();                    // 清理旧节点
        const ctx = a.ctx;
        const t = type || noiseType;
        const master = ctx.createGain(); master.gain.value = mutedRef.current ? 0 : volRef.current;
        master.connect(ctx.destination); a.masterGain = master;
        const loopSrc=(buf)=>{const s=ctx.createBufferSource();s.buffer=buf;s.loop=true;a.sources.push(s);return s;};
        if (t==="brown"){
          const src=loopSrc(getBuf("brown")); src.connect(master); src.start();
        } else {
          const bed=loopSrc(getBuf("pink")); const bedLp=ctx.createBiquadFilter(); bedLp.type="lowpass"; bedLp.frequency.value=1300;
          const bedG=ctx.createGain(); bedG.gain.value=0.9; bed.connect(bedLp);bedLp.connect(bedG);bedG.connect(master);bed.start();
          const hiss=loopSrc(getBuf("white")); const bp=ctx.createBiquadFilter(); bp.type="bandpass"; bp.frequency.value=5200; bp.Q.value=0.8;
          const hissG=ctx.createGain(); hissG.gain.value=0.1; hiss.connect(bp);bp.connect(hissG);hissG.connect(master);hiss.start();
          a.dropTimer=setInterval(()=>{
            if(!a.masterGain)return; const n=1+Math.floor(Math.random()*3);
            for(let i=0;i<n;i++){const t0=ctx.currentTime+Math.random()*0.12;const o=ctx.createOscillator();o.type="sine";const f=500+Math.random()*2200;o.frequency.setValueAtTime(f,t0);o.frequency.exponentialRampToValueAtTime(f*0.6,t0+0.06);const g=ctx.createGain();const v=0.04+Math.random()*0.1;g.gain.setValueAtTime(0.0001,t0);g.gain.exponentialRampToValueAtTime(v,t0+0.005);g.gain.exponentialRampToValueAtTime(0.0001,t0+0.05+Math.random()*0.06);o.connect(g);g.connect(a.masterGain);o.start(t0);o.stop(t0+0.18);}
          },130);
        }
      }, [noiseType, ensureCtx, stopNoise, getBuf]);

      const playClick = useCallback(() => {
        if(mutedRef.current)return;
        try{
          const ctx=getCtx();const t=ctx.currentTime;const n=Math.floor(ctx.sampleRate*0.005);
          const buf=ctx.createBuffer(1,n,ctx.sampleRate);const d=buf.getChannelData(0);
          for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/n,6);
          const src=ctx.createBufferSource();src.buffer=buf;
          const bp=ctx.createBiquadFilter();bp.type="bandpass";bp.frequency.value=4000;bp.Q.value=1.8;
          const g1=ctx.createGain();g1.gain.value=0.7;src.connect(bp);bp.connect(g1);g1.connect(ctx.destination);src.start(t);
          const osc=ctx.createOscillator();osc.type="sine";osc.frequency.value=3500;
          const g2=ctx.createGain();g2.gain.setValueAtTime(0.18,t);g2.gain.exponentialRampToValueAtTime(0.0001,t+0.012);
          osc.connect(g2);g2.connect(ctx.destination);osc.start(t);osc.stop(t+0.015);
          const osc2=ctx.createOscillator();osc2.type="sine";osc2.frequency.value=800;
          const g3=ctx.createGain();g3.gain.setValueAtTime(0.06,t);g3.gain.exponentialRampToValueAtTime(0.0001,t+0.008);
          osc2.connect(g3);g3.connect(ctx.destination);osc2.start(t);osc2.stop(t+0.01);
        }catch(e){}
      }, [getCtx]);

      const playAlert = useCallback(() => {
        if(mutedRef.current)return;
        try{
          const ctx=getCtx();const t0=ctx.currentTime;
          const beeps=ALERT_GROUPS.flatMap(t=>[[880,t],[659.25,t+0.45]]);
          beeps.forEach(([f,dt])=>{
            const o=ctx.createOscillator();o.type="sine";o.frequency.value=f;
            const g=ctx.createGain();g.gain.setValueAtTime(0.0001,t0+dt);g.gain.exponentialRampToValueAtTime(0.4,t0+dt+0.02);g.gain.exponentialRampToValueAtTime(0.0005,t0+dt+0.6);
            o.connect(g);g.connect(ctx.destination);o.start(t0+dt);o.stop(t0+dt+0.7);
          });
        }catch(e){}
      }, [getCtx]);

      const triggerFlashes = useCallback(() => {
        flashTimersRef.current.forEach(clearTimeout);
        flashTimersRef.current = ALERT_GROUPS.map(t =>
          setTimeout(()=>setFlashKey(k=>k+1), (t + 0.225)*1000)
        );
      }, []);

      const notify = useCallback((title, body) => {
        try{
          if("Notification" in window && Notification.permission==="granted"){
            new Notification(title, { body, tag:"pomodoro", icon:"data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍠</text></svg>" });
          }
        }catch(e){}
      }, []);

      useEffect(()=>{
        if(!running)return;
        const tick = () => {
          const rem = Math.max(0, Math.ceil((endRef.current - Date.now()) / 1000));
          setTimeLeft(rem);
        };
        const id = setInterval(tick, 250);
        const handleVisibility = () => {
          if (document.visibilityState === 'visible') {
            tick();
          }
        };
        document.addEventListener('visibilitychange', handleVisibility);
        return () => {
          clearInterval(id);
          document.removeEventListener('visibilitychange', handleVisibility);
        };
      },[running]);

      useEffect(()=>{
        if(running&&timeLeft===0){
          const { mode, task, workMin, breakMin } = endMetaRef.current;
          setRunning(false);setLocked(false);stopNoise();playAlert();triggerFlashes();
          if(mode==="work"){
            const now=new Date();
            const entry={date:todayStr(),time:`${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`,min:activeWorkMinRef.current,task:task.trim()||"未命名任务"};
            setCount(c=>{const n=c+1;sessionStorage.setItem("pomodoro-count",String(n));return n;});
            setHistory(h=>{const n=[entry,...h].slice(0,50);sessionStorage.setItem("pomodoro-history",JSON.stringify(n));return n;});
            setShowPlusOne(true);
            notify("🍠 番薯钟","工作时间结束，休息一下吧");
            setMode("break");const bd=breakMin*60;setTimeLeft(bd);setTotal(bd);
          } else {
            notify("🍠 番薯钟","休息结束，开始下一个番薯钟");
            setMode("work");const wd=workMin*60;setTimeLeft(wd);setTotal(wd);
          }
        }
      },[timeLeft, running, stopNoise, playAlert, triggerFlashes, notify]);

      useEffect(()=>{const a=audio.current;if(a.masterGain)a.masterGain.gain.value=muted?0:volume;},[volume,muted]);

      useEffect(()=>{
        try{const c=sessionStorage.getItem("pomodoro-count");if(c!==null)setCount(parseInt(c,10)||0);}catch(e){}
        try{const h=sessionStorage.getItem("pomodoro-history");if(h)setHistory(JSON.parse(h)||[]);}catch(e){}
      },[]);

      const clearHistory = useCallback(()=>{playClick();setHistory([]);setCount(0);sessionStorage.removeItem("pomodoro-history");sessionStorage.removeItem("pomodoro-count");}, [playClick]);

      const togglePlay = useCallback(async () => {
        playClick();
        if(running){
          setRunning(false);
          stopNoise();
        } else {
          if(!locked&&mode==="work")activeWorkMinRef.current=workMin;
          if("Notification" in window && Notification.permission==="default"){try{Notification.requestPermission();}catch(e){}}
          const t=timeLeft===0?curDuration:timeLeft;
          if(timeLeft===0){setTimeLeft(curDuration);setTotal(curDuration);}
          // 等待噪音启动后再开始计时，消除声音延迟
          await startNoise();
          endRef.current=Date.now()+t*1000;
          setLocked(true);
          setRunning(true);
        }
      }, [running, locked, mode, workMin, timeLeft, curDuration, playClick, stopNoise, startNoise]);

      const reset = useCallback(()=>{setRunning(false);setLocked(false);stopNoise();setTimeLeft(curDuration);setTotal(curDuration);}, [curDuration, stopNoise]);
