<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>番薯钟</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍠</text></svg>" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:radial-gradient(135% 95% at 50% -12%, #2A2820 0%, #1C1B17 56%) fixed;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Helvetica Neue",system-ui,sans-serif;}
    button,input,textarea,select{font-family:inherit}
    input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
    input[type=range]{cursor:pointer}
    button{border:none;cursor:pointer}
    input{border:none}
    .btn-press{transition:transform .1s,background .15s}.btn-press:hover{background:#3A3930!important}.btn-press:active{transform:scale(.9)}
    .btn-press-sm{transition:transform .1s}.btn-press-sm:active{transform:scale(.95)}
    .preset-chip{transition:color .15s,border-color .15s}.preset-chip:hover{color:#D2613C!important;border-color:#D2613C!important}
    @keyframes breathe-dot{0%,100%{transform:scale(.65);opacity:.3}50%{transform:scale(1.35);opacity:.9}}
    @keyframes taskHintFloat {0%   { opacity: 0; transform: translateX(-50%) translateY(90px); }15%  { opacity: 1; transform: translateX(-50%) translateY(63px); }85%  { opacity: 1; transform: translateX(-50%) translateY(-63px); }100% { opacity: 0; transform: translateX(-50%) translateY(-90px); }}
    .task-hint{position:absolute;left:50%;top:50%;color:#E8E6DF;font-size:22px;white-space:nowrap;pointer-events:none;z-index:10;animation:taskHintFloat 2s linear forwards}
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const { useState, useEffect, useRef, useCallback, useReducer, useMemo, createElement: h, Fragment } = React;
    const { createPortal } = ReactDOM;
 
    /* ===================== 设计 token ===================== */
    const COLORS = { ORANGE:"#D2613C", BG:"#1C1B17", CARD:"#27261F", BTN:"#2F2E27", TEXT_DIM:"#8E8C84", TEXT_MAIN:"#E8E6DF" };
    const { ORANGE, CARD, BTN, TEXT_DIM, TEXT_MAIN } = COLORS;
    const FONT = '-apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", system-ui, sans-serif';
    const glass = { background:"rgba(38,37,30,0.5)", backdropFilter:"blur(20px) saturate(120%)", WebkitBackdropFilter:"blur(20px) saturate(120%)", border:"1px solid rgba(255,255,255,0.08)" };
    const RING_R = 116, RING_C = 2 * Math.PI * RING_R;
    const ALERT_GROUPS = [0, 1.1, 2.2];
    const PRESETS = [["25:5",25,5], ["50:10",50,10], ["90:20",90,20]];
    const MAX_MIN = 180;
    const card = { width:"100%", borderRadius:16, padding:16, ...glass };
    const cardTitle = { color:TEXT_MAIN, fontSize:16, fontWeight:700, whiteSpace:"nowrap" };
    const statNum = { color:TEXT_MAIN, fontWeight:800, fontSize:22, lineHeight:1.1, fontFamily:FONT };
    const dimXS = { color:TEXT_DIM, fontSize:11 };
 
    /* ===================== 安全存储 ===================== */
    const _mem = {};
    const store = {
      get(k){ try { return sessionStorage.getItem(k); } catch(e){ return (k in _mem) ? _mem[k] : null; } },
      set(k,v){ try { sessionStorage.setItem(k,v); } catch(e){ _mem[k]=v; } },
      remove(k){ try { sessionStorage.removeItem(k); } catch(e){ delete _mem[k]; } },
    };
 
    /* ===================== 工具函数 ===================== */
    const pad2 = (n) => String(n).padStart(2,"0");
    const todayStr = () => { const d=new Date(); return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; };
    const fmtShortDate = (date, time) => { const [,m,d]=date.split("-"); return `${pad2(m)}-${pad2(d)} ${time}`; };
    const fmtDuration = (min) => { if(min<60) return `${min}m`; const hh=Math.floor(min/60), r=min%60; return r===0?`${hh}h`:`${hh}h${r}m`; };
    const fmtTotalCN = (min) => { if(min<=0) return "0分钟"; const hh=Math.floor(min/60), m=min%60; return hh===0?`${m}分钟`:m===0?`${hh}小时`:`${hh}小时${m}分钟`; };
    const fmtMMSS = (s) => `${pad2(Math.floor(s/60))}:${pad2(s%60)}`;
    const parseMin = (s, fb) => { const n=parseInt(s,10); return Number.isFinite(n)&&n>=1 ? Math.min(MAX_MIN,n) : fb; };
 
    /* ===================== 图标 ===================== */
    const ICONS = {
      Play:[["polygon",{points:"6 3 20 12 6 21 6 3"}]],
      Pause:[["rect",{x:"14",y:"4",width:"4",height:"16",rx:"1"}],["rect",{x:"6",y:"4",width:"4",height:"16",rx:"1"}]],
      RotateCcw:[["path",{d:"M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"}],["path",{d:"M3 3v5h5"}]],
      Volume2:[["polygon",{points:"11 5 6 9 2 9 2 15 6 15 11 19 11 5"}],["path",{d:"M15.54 8.46a5 5 0 0 1 0 7.07"}],["path",{d:"M19.07 4.93a10 10 0 0 1 0 14.14"}]],
      VolumeX:[["polygon",{points:"11 5 6 9 2 9 2 15 6 15 11 19 11 5"}],["line",{x1:"22",x2:"16",y1:"9",y2:"15"}],["line",{x1:"16",x2:"22",y1:"9",y2:"15"}]],
      Lock:[["rect",{width:"18",height:"11",x:"3",y:"11",rx:"2",ry:"2"}],["path",{d:"M7 11V7a5 5 0 0 1 10 0v4"}]],
      ChevronDown:[["path",{d:"m6 9 6 6 6-6"}]],
      ChevronUp:[["path",{d:"m18 15-6-6-6 6"}]],
      Trash2:[["path",{d:"M3 6h18"}],["path",{d:"M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"}],["path",{d:"M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"}],["line",{x1:"10",x2:"10",y1:"11",y2:"17"}],["line",{x1:"14",x2:"14",y1:"11",y2:"17"}]],
      PictureInPicture:[
        ["rect",{x:"2",y:"4",width:"20",height:"16",rx:"3",ry:"3"}],
        ["rect",{x:"12",y:"11",width:"8",height:"5",rx:"2",ry:"2"}]
      ],
    };
    const Icon = ({ name, size=24, color="currentColor", style }) => {
      const data = ICONS[name];
      return data ? h("svg",{xmlns:"http://www.w3.org/2000/svg",width:size,height:size,viewBox:"0 0 24 24",fill:"none",stroke:color,strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round",style},
        data.map(([tag,attrs],i)=>h(tag,{key:i,...attrs}))) : null;
    };
 
    /* ===================== Clawd 像素蟹 ===================== */
    const Clawd = ({ isBreak=false, isUrgent=false, isCelebrating=false }) => {
      const seed = useMemo(()=>Math.random(),[]);
      const seed2 = useMemo(()=>Math.random(),[]);
      const zzzDelays = useMemo(()=>[0,1.6,3.2],[]);
 
      const cssBase = `
        @keyframes clawd-walk{0%{transform:translateX(-90px)}100%{transform:translateX(calc(100vw + 90px))}}
        @keyframes clawd-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
        @keyframes snipL{0%{transform:rotate(0)}20%{transform:rotate(-18deg)}50%{transform:rotate(-18deg)}100%{transform:rotate(0)}}
        @keyframes snipR{0%{transform:rotate(0)}20%{transform:rotate(18deg)}50%{transform:rotate(18deg)}100%{transform:rotate(0)}}
        @keyframes clawd-stumble{0%{transform:rotate(0)}4%{transform:rotate(10deg)}9%{transform:rotate(-2.5deg)}14%{transform:rotate(1deg)}18%{transform:rotate(0)}100%{transform:rotate(0)}}
        .clawd-walk{animation:clawd-walk 40s linear infinite;will-change:transform}
        .clawd-bob{animation:clawd-bob .5s ease-in-out infinite;will-change:transform}
        .clawd-lookback{will-change:transform}
        .clawd-stumble{animation:clawd-stumble 13s ease-in-out infinite;animation-delay:calc(-13s * var(--seed2,0));will-change:transform}
        .claw{transform-box:fill-box}
        .claw-l{transform-origin:90% 85%;animation:snipL 1.3s ease-in-out infinite}
        .claw-r{transform-origin:10% 85%;animation:snipR 1.3s ease-in-out infinite;animation-delay:.4s}
        @keyframes blink{0%,88%,100%{transform:scaleY(1)}93%{transform:scaleY(.1)}}
        .eye-open{transform-box:fill-box;transform-origin:center center;animation:blink 3.5s ease-in-out infinite}
        .eye-closed{opacity:0}
        @keyframes clawd-gaze-back{0%{transform:translateX(0)}5%{transform:translateX(-100%)}18%{transform:translateX(-100%)}28%{transform:translateX(0)}100%{transform:translateX(0)}}
        .clawd-pupil{transform-box:fill-box;animation:clawd-gaze-back 9s ease-in-out infinite;animation-delay:calc(-9s * var(--seed,0))}
        .mouth{transform-box:fill-box;transform-origin:center center}
        @keyframes zzz-rise{0%{opacity:0;transform:translateY(8px) scale(.45)}16%{opacity:.5;transform:translateY(-1px) scale(.72)}100%{opacity:0;transform:translateY(-36px) scale(1.1)}}
        .zzz-bubble{position:absolute;top:-28px;left:50%;transform:translateX(-50%);display:flex;gap:3px;pointer-events:none;z-index:1}
        .zzz-char{display:inline-block;color:rgba(255,255,255);font-weight:700;font-style:italic;font-family:Georgia,"Times New Roman",serif;line-height:1;animation:zzz-rise 5.2s ease-out infinite;opacity:0}
      `;
      const cssBreak = isBreak ? `
        .clawd-walk{animation-duration:60s!important}
        .clawd-bob{animation-duration:1.6s!important}
        .claw-l{animation-duration:4.2s!important}
        .claw-r{animation-duration:4.2s!important;animation-delay:1.3s!important}
        .eye-open{animation:blink-sleepy-eye 7s ease-in-out infinite!important}
        .eye-closed {animation: blink-sleepy-line 7s ease-in-out infinite !important;transform-box: fill-box;transform-origin: center bottom ;opacity: 1 !important;}
        @keyframes blink-sleepy-eye{0%,55%,100%{transform:scaleY(0)}62%,68%{transform:scaleY(1)}75%,100%{transform:scaleY(0)}}
        @keyframes blink-sleepy-line {0%,55%,100%{opacity: 1;transform:scaleY(1)}62%,68%{opacity: 0;transform:scaleY(0)}75%,100%{opacity: 1;transform:scaleY(1)}}
        .mouth{animation:yawn-mouth 7s ease-in-out infinite}
        @keyframes yawn-mouth{0%,45%,82%,100%{transform:scaleY(1)}58%,68%{transform:scaleY(3.2)}}
      ` : `.eye-open{animation:blink 3.5s ease-in-out infinite!important}.eye-closed{opacity:0!important}.mouth{animation:none}.zzz-bubble{display:none}`;
      const cssUrgent = isUrgent ? `
        .clawd-walk{animation-duration:22s!important}
        .clawd-bob{animation-duration:.28s!important}
        .claw-l{animation-duration:.55s!important}
        .claw-r{animation-duration:.55s!important;animation-delay:.15s!important}
        @keyframes blink-wide{0%,85%,100%{transform:scaleY(1.25)}90%{transform:scaleY(.1)}}
        .eye-open{animation:blink-wide 2.2s ease-in-out infinite!important}
        .clawd-pupil{animation-duration:4s!important}
      ` : ``;
      const cssCelebrate = isCelebrating ? `
        @keyframes celebrate-jump{0%{transform:translateY(0) rotate(0)}20%{transform:translateY(-22px) rotate(-6deg)}40%{transform:translateY(-24px) rotate(6deg)}60%{transform:translateY(-14px) rotate(-3deg)}80%{transform:translateY(-6px) rotate(2deg)}100%{transform:translateY(0) rotate(0)}}
        .clawd-bob{animation:celebrate-jump .38s ease-out 4!important}
        .claw-l{animation-duration:.3s!important}
        .claw-r{animation-duration:.3s!important;animation-delay:.08s!important}
      ` : ``;
 
      const rect = (p) => h("rect", p);
      return h(Fragment, null,
        h("style", null, cssBase + cssBreak + cssUrgent + cssCelebrate),
        h("div",{className:"clawd-walk",style:{position:"fixed",bottom:6,left:0,zIndex:9999,pointerEvents:"none",opacity:.9}},
          h("div",{className:"clawd-bob"},
            h("div",{className:"clawd-lookback",style:{'--seed':seed}},
              h("div",{className:"clawd-stumble",style:{'--seed2':seed2}},
                isBreak && h("div",{className:"zzz-bubble"},
                  zzzDelays.map((d,i)=>h("span",{key:i,className:"zzz-char",style:{animationDelay:`${d}s`,fontSize:`${11+i*2.5}px`}}, i===0?"z":"Z"))
                ),
                h("svg",{width:"78",height:"65",viewBox:"0 0 24 20",shapeRendering:"crispEdges"},
                  h("g",{className:"claw claw-l"},
                    rect({x:"0",y:"3",width:"4",height:"2",fill:"#E2795B"}),
                    rect({x:"0",y:"6",width:"4",height:"1",fill:"#E2795B"}),
                    rect({x:"2",y:"5",width:"3",height:"3",fill:"#D2613C"})),
                  h("g",{className:"claw claw-r"},
                    rect({x:"20",y:"3",width:"4",height:"2",fill:"#E2795B"}),
                    rect({x:"20",y:"6",width:"4",height:"1",fill:"#E2795B"}),
                    rect({x:"19",y:"5",width:"3",height:"3",fill:"#D2613C"})),
                  rect({x:"5",y:"7",width:"1",height:"2",fill:"#C05B3F"}),
                  rect({x:"18",y:"7",width:"1",height:"2",fill:"#C05B3F"}),
                  rect({x:"7",y:"8",width:"10",height:"1",fill:"#E2795B"}),
                  rect({x:"6",y:"9",width:"12",height:"6",fill:"#E2795B"}),
                  rect({x:"7",y:"15",width:"10",height:"1",fill:"#D2613C"}),
                  h("g",{className:"eye"},
                    h("g",{className:"eye-open"},
                      rect({x:"9",y:"10",width:"2",height:"2",fill:"#FFFFFF"}),
                      rect({className:"clawd-pupil",x:"10",y:"11",width:"1",height:"1",fill:"#1C1B17"})
                    ),
                    rect({className:"eye-closed",x:"9",y:"11",width:"2",height:"0.15",fill:"#1C1B17"})
                  ),
                  h("g",{className:"eye"},
                    h("g",{className:"eye-open"},
                      rect({x:"13",y:"10",width:"2",height:"2",fill:"#FFFFFF"}),
                      rect({className:"clawd-pupil",x:"14",y:"11",width:"1",height:"1",fill:"#1C1B17"})
                    ),
                    rect({className:"eye-closed",x:"13",y:"11",width:"2",height:"0.15",fill:"#1C1B17"})
                  ),
                  rect({x:"11",y:"13",width:"2",height:"1",fill:"#C05B3F",className:"mouth"}),
                  rect({x:"7",y:"16",width:"1",height:"2",fill:"#C05B3F"}),
                  rect({x:"10",y:"16",width:"1",height:"2",fill:"#C05B3F"}),
                  rect({x:"13",y:"16",width:"1",height:"2",fill:"#C05B3F"}),
                  rect({x:"16",y:"16",width:"1",height:"2",fill:"#C05B3F"})
                )
              )
            )
          )
        )
      );
    };
 
    /* ===================== 音频 Hook ===================== */
    const playTone = (ctx, t, dest, freq, gainStart, gainEnd, rampDur, stopDur) => {
      const o = ctx.createOscillator(); o.type="sine"; o.frequency.value=freq;
      const g = ctx.createGain();
      g.gain.setValueAtTime(gainStart, t);
      g.gain.exponentialRampToValueAtTime(gainEnd, t+rampDur);
      o.connect(g); g.connect(dest); o.start(t); o.stop(t+stopDur);
    };
 
    function useAudio() {
      const audio = useRef({ ctx:null, sources:[], masterGain:null, dropTimer:null, buffers:{}, noiseId:0 });
 
      const getCtx = useCallback(() => {
        const a = audio.current;
        if(!a.ctx) a.ctx = new AudioContext();
        if(a.ctx.state==="suspended") a.ctx.resume().catch(()=>{});
        return a.ctx;
      }, []);
      const ensureCtx = useCallback(async () => {
        const ctx = getCtx();
        if(ctx.state==="suspended") await ctx.resume();
        return ctx;
      }, [getCtx]);
 
      const makeBuffer = useCallback((type) => {
        const ctx = getCtx();
        const len = ctx.sampleRate * 2;
        const buf = ctx.createBuffer(1, len, ctx.sampleRate);
        const d = buf.getChannelData(0);
        if(type==="white"){
          for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
        } else if(type==="brown"){
          let last=0;
          for(let i=0;i<len;i++){ const w=Math.random()*2-1; last=(last+0.02*w)/1.02; d[i]=last*3.5; }
        } else {
          let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
          for(let i=0;i<len;i++){
            const w=Math.random()*2-1;
            b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759; b2=0.969*b2+w*0.153852;
            b3=0.8665*b3+w*0.3104856; b4=0.55*b4+w*0.5329522; b5=-0.7616*b5-w*0.016898;
            d[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11; b6=w*0.115926;
          }
        }
        return buf;
      }, [getCtx]);
      const getBuf = useCallback((t)=>{ const a=audio.current; if(!a.buffers[t]) a.buffers[t]=makeBuffer(t); return a.buffers[t]; }, [makeBuffer]);
 
      const stopNoise = useCallback(() => {
        const a = audio.current;
        a.sources.forEach(s=>{ try{s.stop();}catch(e){} });
        a.sources = []; a.masterGain = null;
        if(a.dropTimer){ clearInterval(a.dropTimer); a.dropTimer=null; }
      }, []);
 
      const startNoise = useCallback(async ({ type, volume, mode }) => {
        if(mode==="break") return;
        const a = audio.current;
        const id = ++a.noiseId;
        await ensureCtx();
        if(id !== a.noiseId) return;
        stopNoise();
        const ctx = a.ctx;
        const master = ctx.createGain();
        master.gain.value = volume;
        master.connect(ctx.destination);
        a.masterGain = master;
        const loopSrc = (buf) => { const s=ctx.createBufferSource(); s.buffer=buf; s.loop=true; a.sources.push(s); return s; };
        if(type==="brown"){
          const src = loopSrc(getBuf("brown")); src.connect(master); src.start();
        } else {
          const bed = loopSrc(getBuf("pink"));
          const bedLp = ctx.createBiquadFilter(); bedLp.type="lowpass"; bedLp.frequency.value=1300;
          const bedG = ctx.createGain(); bedG.gain.value=0.9;
          bed.connect(bedLp); bedLp.connect(bedG); bedG.connect(master); bed.start();
          const hiss = loopSrc(getBuf("white"));
          const bp = ctx.createBiquadFilter(); bp.type="bandpass"; bp.frequency.value=5200; bp.Q.value=0.8;
          const hissG = ctx.createGain(); hissG.gain.value=0.1;
          hiss.connect(bp); bp.connect(hissG); hissG.connect(master); hiss.start();
          a.dropTimer = setInterval(() => {
            if(!a.masterGain) return;
            const n = 1 + Math.floor(Math.random()*3);
            for(let i=0;i<n;i++){
              const t0 = ctx.currentTime + Math.random()*0.12;
              const o = ctx.createOscillator(); o.type="sine";
              const f = 500 + Math.random()*2200;
              o.frequency.setValueAtTime(f, t0);
              o.frequency.exponentialRampToValueAtTime(f*0.6, t0+0.06);
              const g = ctx.createGain();
              const v = 0.04 + Math.random()*0.1;
              g.gain.setValueAtTime(0.0001, t0);
              g.gain.exponentialRampToValueAtTime(v, t0+0.005);
              g.gain.exponentialRampToValueAtTime(0.0001, t0+0.05+Math.random()*0.06);
              o.connect(g); g.connect(a.masterGain); o.start(t0); o.stop(t0+0.18);
            }
          }, 130);
        }
      }, [ensureCtx, stopNoise, getBuf]);
 
      const playClick = useCallback(() => {
        try {
          const ctx = getCtx(); const t = ctx.currentTime;
          const n = Math.floor(ctx.sampleRate*0.005);
          const buf = ctx.createBuffer(1, n, ctx.sampleRate);
          const d = buf.getChannelData(0);
          for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/n,6);
          const src = ctx.createBufferSource(); src.buffer=buf;
          const bp = ctx.createBiquadFilter(); bp.type="bandpass"; bp.frequency.value=4000; bp.Q.value=1.8;
          const g1 = ctx.createGain(); g1.gain.value=0.7;
          src.connect(bp); bp.connect(g1); g1.connect(ctx.destination); src.start(t);
          playTone(ctx, t, ctx.destination, 3500, 0.18, 0.0001, 0.012, 0.015);
          playTone(ctx, t, ctx.destination, 800, 0.06, 0.0001, 0.008, 0.01);
        } catch(e){}
      }, [getCtx]);
 
      const playAlert = useCallback(() => {
        try {
          const ctx = getCtx(); const t0 = ctx.currentTime;
          const beeps = ALERT_GROUPS.flatMap(t => [[880,t],[659.25,t+0.45]]);
          beeps.forEach(([f,dt]) => {
            const o = ctx.createOscillator(); o.type="sine"; o.frequency.value=f;
            const g = ctx.createGain();
            g.gain.setValueAtTime(0.0001, t0+dt);
            g.gain.exponentialRampToValueAtTime(0.4, t0+dt+0.02);
            g.gain.exponentialRampToValueAtTime(0.0005, t0+dt+0.6);
            o.connect(g); g.connect(ctx.destination); o.start(t0+dt); o.stop(t0+dt+0.7);
          });
        } catch(e){}
      }, [getCtx]);
 
      const setMasterGain = useCallback((v) => { const a=audio.current; if(a.masterGain) a.masterGain.gain.value=v; }, []);
 
      useEffect(() => {
        const tm = setTimeout(()=>{ try{ getBuf("pink"); getBuf("brown"); getBuf("white"); }catch(e){} }, 200);
        return ()=>clearTimeout(tm);
      }, [getBuf]);
      useEffect(() => {
        const warm = ()=>{ ensureCtx().catch(()=>{}); };
        document.addEventListener('pointerdown', warm, { once:true });
        return ()=>document.removeEventListener('pointerdown', warm);
      }, [ensureCtx]);
 
      return { startNoise, stopNoise, playClick, playAlert, setMasterGain };
    }
 
    /* ===================== 计时 Hook ===================== */
    function timerReducer(s, a) {
      switch(a.type){
        case 'TICK':         return { ...s, timeLeft: Math.max(0, Math.ceil((s.endAt - Date.now())/1000)) };
        case 'SET_DURATION': return { ...s, timeLeft:a.payload, total:a.payload };
        case 'START':        return { ...s, running:true, locked:true, endAt: Date.now() + s.timeLeft*1000 };
        case 'PAUSE':        return { ...s, running:false };
        case 'RESET':        return { ...s, running:false, locked:false, timeLeft:a.payload, total:a.payload };

      useEffect(() => {
        if(!state.running) return;
        const tick = () => dispatch({ type:'TICK' });
        const id = setInterval(tick, 250);
        const onVis = () => { if(document.visibilityState==='visible') tick(); };
        document.addEventListener('visibilitychange', onVis);
        return () => { clearInterval(id); document.removeEventListener('visibilitychange', onVis); };
      }, [state.running]);

        if(state.running && state.timeLeft===0){
          dispatch({ type:'FINISH' });
          if(completeRef.current) completeRef.current();
        }
      }, [state.timeLeft, state.running]);
 
      return { ...state, dispatch };

    function createQueue(arr) { return { arr, queue: [], index: 0 }; }
    function pickNext(state) {
      if (state.index >= state.queue.length) {
        const last = state.queue[state.queue.length - 1];
        let shuffled;
        do { shuffled = [...state.arr].sort(() => Math.random() - 0.5); } while (shuffled[0] === last);
        state.queue = shuffled; state.index = 0;
      }
      return state.queue[state.index++];
    }

        const queue = phase === "focus" ? focusQueue : phase === "finish" ? finishQueue : startQueue;
        const setNewQuote = () => { setCurrentQuote(pickNext(queue)); setVisible(true); };
        setVisible(false); fadeRef.current = setTimeout(setNewQuote, 400);
        if (phase !== "finish") { timerRef.current = setInterval(() => { setVisible(false); fadeRef.current = setTimeout(setNewQuote, 400); }, 35000); }

      }, [phase]);

      const clearHistory = useCallback(() => {
        audio.playClick();
        setHistory([]); setCount(0);
        store.remove("pomodoro-history"); store.remove("pomodoro-count");
      }, [audio]);
 
      const totalMin = history.reduce((s,it)=>s+(it.min||0), 0);
 
      const phase = useMemo(() => {
        if (mode === "break" && timer.running) return "resting";
        if (mode === "break" && justFinishedWork) return "finish";
        if (mode === "work" && timer.running) return "focus";
        return "start";
      }, [mode, timer.running, justFinishedWork]);

      const togglePip = useCallback(async () => {
  audio.playClick();
  if (pipWindow) return pipWindow.close();
  const win = await window.documentPictureInPicture.requestWindow({ width: 200, height: 150 });
  win.document.body.style.cssText = "margin:0;overflow:hidden;background:#1C1B17";
  win.document.title = "番薯钟 🍠";
  win.addEventListener('pagehide', () => setPipWindow(null));
  setPipWindow(win);
}, [pipWindow, audio]);

      useEffect(() => {
        return () => { if (pipWindow) pipWindow.close(); };
      }, [pipWindow]);
 
      return h("div",{style:{minHeight:"100vh",width:"100%",display:"flex",justifyContent:"center",position:"relative",overflow:"hidden",background:"transparent",fontFamily:FONT}},
        
        h(Clawd,{ isBreak:mode==="break", isUrgent, isCelebrating }),
        
        h("div",{style:{width:"100%",maxWidth:390,display:"flex",flexDirection:"column",alignItems:"center",gap:16,padding:"16px",position:"relative",zIndex:1}},
          h("div",{style:{width:"100%",position:"relative"}},
            h("input",{ type:"text", value:task, disabled:timer.locked, maxLength:20, onChange:e=>setTask(e.target.value), placeholder:"请输入当前任务…",
              style:{ width:"100%",borderRadius:12,padding:"12px 16px",textAlign:"center",outline:"none",...glass,color:TEXT_MAIN,fontSize:18,opacity:timer.locked?0.6:1,cursor:timer.locked?"not-allowed":"text",fontFamily:FONT } }),
            timer.locked && h("span",{style:{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)"}}, h(Icon,{name:"Lock",size:12,color:ORANGE}))),
          
          h(TimerRing,{ timeLeft:timer.timeLeft, total:timer.total, running:timer.running, flashId, showPlusOne, onPlusOneEnd:()=>setShowPlusOne(false), showTaskHint }),
          
          h(MotivationalQuote,{ phase }),
          h("div",{style:{display:"flex",gap:12,width:"100%",opacity:timer.locked?0.55:1,transition:"opacity .2s"}},
            [["work","工作"],["break","休息"]].map(([m,label])=>
              h("button",{ key:m, onClick:()=>switchMode(m), disabled:timer.locked,
                style:{flex:1,padding:"8px 0",borderRadius:12,fontWeight:500,background:mode===m?ORANGE:BTN,color:mode===m?"#fff":TEXT_DIM,fontSize:15,cursor:timer.locked?"not-allowed":"pointer",transition:"background .2s, color .2s"} }, label))),
          h("div",{style:{display:"flex",gap:20}},
            [
              { onClick:togglePlay, label:timer.running?"暂停":"开始", icon:timer.running?h(Icon,{name:"Pause",size:20}):h(Icon,{name:"Play",size:20,style:{marginLeft:2}}) },
              { onClick:handleResetClick, label:"重置", icon:h(Icon,{name:"RotateCcw",size:19}) },
            ].map(({onClick,label,icon},i)=>
              h("button",{ key:i, onClick, "aria-label":label, className:"btn-press",
                style:{width:52,height:52,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",background:BTN,color:TEXT_MAIN} }, icon)),
            // 画中画按钮 — 尺寸/颜色/风格与其他按钮保持一致
            h("button",{
              key: 'pip',
              onClick: togglePip,
              className: "btn-press",
              "aria-label": pipWindow ? "关闭画中画" : "开启画中画",
              style:{width:52,height:52,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",background:pipWindow ? ORANGE : BTN,color:TEXT_MAIN,transition:"background 0.2s"}
            }, h(Icon,{name:"PictureInPicture",size:20,color:pipWindow?"#fff":TEXT_MAIN}))
          ),
          h("div",{style:{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 4px"}},
            h("div",{style:{display:"flex",alignItems:"center",gap:8}},
              h("span",{style:{fontSize:22}},"🍠"),
              h("div",null, h("div",{style:dimXS},"本次完成的番薯钟数"), h("div",{style:statNum}, count))),
            h("div",{style:{textAlign:"right"}},
              h("div",{style:dimXS},"总时长"), h("div",{style:{...statNum,whiteSpace:"nowrap"}}, fmtTotalCN(totalMin)))),
          h(NoiseSelector,{ mode, noiseType, volume, onChangeNoise:changeNoise, onVolume:setVolume, onToggleSliderMute:toggleSliderMute }),
          h(DurationSettings,{ workStr, breakStr,
            onWorkChange, onBreakChange, onWorkBlur:()=>setWorkStr(String(workMin)), onBreakBlur:()=>setBreakStr(String(breakMin)), onPreset:applyPreset }),
          h(HistoryPanel,{ history, show:showHistory, onToggle:()=>{ audio.playClick(); setShowHistory(s=>!s); }, onClear:clearHistory })
        ),
        
        pipWindow && createPortal(
          h(SimplifiedPipView, { 
            timeLeft: timer.timeLeft, 
            total: timer.total,
            mode: mode, 
            running: timer.running, 
            onTogglePlay: togglePlay 
          }),
          pipWindow.document.body
        ),

        showResetConfirm && h("div",{onClick:cancelReset,style:{position:"fixed",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.55)",zIndex:1000}},
          h("div",{onClick:e=>e.stopPropagation(),style:{borderRadius:16,padding:24,display:"flex",flexDirection:"column",alignItems:"center",gap:16,background:CARD,width:280,border:"1px solid rgba(255,255,255,0.06)",boxShadow:"0 8px 40px rgba(0,0,0,0.5)"}},
            h("div",{style:{fontSize:32}},"⏱️"),
            h("div",{style:{textAlign:"center"}},
              h("div",{style:{color:TEXT_MAIN,fontWeight:700,fontSize:16,marginBottom:6}},"确定要重置吗？"),
              h("div",{style:{color:TEXT_DIM,fontSize:13}},"当前进度将会清空")),
            h("div",{style:{display:"flex",gap:12,width:"100%"}},
              h("button",{onClick:cancelReset,style:{flex:1,padding:"8px 0",borderRadius:12,fontWeight:500,background:BTN,color:TEXT_DIM,fontSize:14}},"取消"),
              h("button",{onClick:confirmReset,style:{flex:1,padding:"8px 0",borderRadius:12,fontWeight:500,background:ORANGE,color:"#fff",fontSize:14}},"确认重置"))))
      );
    }
 
    ReactDOM.createRoot(document.getElementById("root")).render(h(PomodoroApp));
  </script>
</body>
</html>
