  @keyframes clawd-walk { 0% { transform: translateX(-90px); } 100% { transform: translateX(calc(100vw + 90px)); } }
  @keyframes clawd-bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
  @keyframes snipL { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(-12deg); } }
  @keyframes snipR { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(12deg); } }
  .clawd-walk { animation: clawd-walk 40s linear infinite; }
  .clawd-bob { animation: clawd-bob 0.5s ease-in-out infinite; }
  .claw { transform-box: fill-box; }
  .claw-l { transform-origin: 90% 85%; animation: snipL 1.3s ease-in-out infinite; }
  .claw-r { transform-origin: 10% 85%; animation: snipR 1.3s ease-in-out infinite; }

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const ORANGE = "#D2613C";
const BG = "#1C1B17";
const CARD = "#27261F";
const BTN = "#2F2E27";
const TEXT_DIM = "#8E8C84";

const RING_R = 116;
const RING_C = 2 * Math.PI * RING_R;

const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
};

/* ---------- 简单存储封装：Claude 环境优先用 window.storage，否则用 localStorage ---------- */
const storageHelper = {
  async get(key) {
    if (typeof window !== "undefined" && window.storage) {
      try {
        const r = await window.storage.get(key);
        return r ? r.value : null;
      } catch (e) {
        return null;
      }
    }
    try { return localStorage.getItem(key); } catch (e) { return null; }
  },
  async set(key, value) {
    if (typeof window !== "undefined" && window.storage) {
      try { await window.storage.set(key, value); return; } catch (e) {}
    }
    try { localStorage.setItem(key, value); } catch (e) {}
  },
};

/* ---------- 图标（内联 SVG，替代 lucide-react） ---------- */
const Icon = ({ children, size = 20, ...rest }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
    strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...rest}>
    {children}
  </svg>
);
const Play = (p) => <Icon {...p}><polygon points="5 3 19 12 5 21 5 3" fill="currentColor" /></Icon>;
const Pause = (p) => <Icon {...p}><rect x="6" y="4" width="4" height="16" rx="1" fill="currentColor" /><rect x="14" y="4" width="4" height="16" rx="1" fill="currentColor" /></Icon>;
const RotateCcw = (p) => <Icon {...p}><polyline points="1 4 1 10 7 10" /><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10" /></Icon>;
const Volume2 = (p) => <Icon {...p}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" /><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07" /></Icon>;
const VolumeX = (p) => <Icon {...p}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" /><line x1="22" y1="9" x2="16" y2="15" /><line x1="16" y1="9" x2="22" y2="15" /></Icon>;
const Lock = (p) => <Icon {...p}><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></Icon>;
const ChevronDown = (p) => <Icon {...p}><polyline points="6 9 12 15 18 9" /></Icon>;
const ChevronUp = (p) => <Icon {...p}><polyline points="18 15 12 9 6 15" /></Icon>;
const Trash2 = (p) => <Icon {...p}><polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /><line x1="10" y1="11" x2="10" y2="17" /><line x1="14" y1="11" x2="14" y2="17" /></Icon>;

const Clawd = () => (
  <div className="clawd-walk" style={{ position: "fixed", bottom: 6, left: 0, zIndex: 9999, pointerEvents: "none", opacity: 0.9 }}>
    <div className="clawd-bob">
      <svg width="78" height="65" viewBox="0 0 24 20" shapeRendering="crispEdges">
        <g className="claw claw-l">
          <rect x="0" y="3" width="4" height="2" fill="#E2795B" />
          <rect x="0" y="6" width="4" height="1" fill="#E2795B" />
          <rect x="2" y="5" width="3" height="3" fill="#D2613C" />
        </g>
        <g className="claw claw-r">
          <rect x="20" y="3" width="4" height="2" fill="#E2795B" />
          <rect x="20" y="6" width="4" height="1" fill="#E2795B" />
          <rect x="19" y="5" width="3" height="3" fill="#D2613C" />
        </g>
        <rect x="5" y="7" width="1" height="2" fill="#C05B3F" />
        <rect x="18" y="7" width="1" height="2" fill="#C05B3F" />
        <rect x="7" y="8" width="10" height="1" fill="#E2795B" />
        <rect x="6" y="9" width="12" height="6" fill="#E2795B" />
        <rect x="7" y="15" width="10" height="1" fill="#D2613C" />
        <rect x="9" y="10" width="2" height="2" fill="#FFFFFF" />
        <rect x="13" y="10" width="2" height="2" fill="#FFFFFF" />
        <rect x="10" y="11" width="1" height="1" fill="#1C1B17" />
        <rect x="14" y="11" width="1" height="1" fill="#1C1B17" />
        <rect x="11" y="13" width="2" height="1" fill="#C05B3F" />
        <rect x="7" y="16" width="1" height="2" fill="#C05B3F" />
        <rect x="10" y="16" width="1" height="2" fill="#C05B3F" />
        <rect x="13" y="16" width="1" height="2" fill="#C05B3F" />
        <rect x="16" y="16" width="1" height="2" fill="#C05B3F" />
      </svg>
    </div>
  </div>
);

function PomodoroApp() {
  const [mode, setMode] = useState("work");
  const [workStr, setWorkStr] = useState("25");
  const [breakStr, setBreakStr] = useState("5");
  const [timeLeft, setTimeLeft] = useState(25 * 60);
  const [total, setTotal] = useState(25 * 60);
  const [running, setRunning] = useState(false);
  const [locked, setLocked] = useState(false);
  const [muted, setMuted] = useState(false);
  const [volume, setVolume] = useState(0.3);
  const [noiseType, setNoiseType] = useState("rain");
  const [count, setCount] = useState(0);
  const [task, setTask] = useState("");
  const [history, setHistory] = useState([]);
  const [showHistory, setShowHistory] = useState(false);
  const [showResetConfirm, setShowResetConfirm] = useState(false);

  const audio = useRef({ ctx: null, sources: [], masterGain: null, dropTimer: null, buffers: {} });
  const endRef = useRef(null);
  const mutedRef = useRef(muted);
  mutedRef.current = muted;
  const volRef = useRef(volume);
  volRef.current = volume;

  const parseMin = (s, fb) => {
    const n = parseInt(s, 10);
    return Number.isFinite(n) && n >= 1 ? Math.min(180, n) : fb;
  };
  const workMin = parseMin(workStr, 25);
  const breakMin = parseMin(breakStr, 5);
  const curDuration = (mode === "work" ? workMin : breakMin) * 60;

  /* ---------------- Audio engine ---------------- */
  const getCtx = () => {
    const a = audio.current;
    if (!a.ctx) a.ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (a.ctx.state === "suspended") a.ctx.resume();
    return a.ctx;
  };

  const makeBuffer = (type) => {
    const ctx = getCtx();
    const len = ctx.sampleRate * 2;
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const d = buf.getChannelData(0);
    if (type === "white") {
      for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    } else if (type === "brown") {
      let last = 0;
      for (let i = 0; i < len; i++) {
        const w = Math.random() * 2 - 1;
        last = (last + 0.02 * w) / 1.02;
        d[i] = last * 3.5;
      }
    } else {
      let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
      for (let i = 0; i < len; i++) {
        const w = Math.random() * 2 - 1;
        b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759;
        b2=0.969*b2+w*0.153852; b3=0.8665*b3+w*0.3104856;
        b4=0.55*b4+w*0.5329522; b5=-0.7616*b5-w*0.016898;
        d[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11; b6=w*0.115926;
      }
    }
    return buf;
  };

  const getBuf = (t) => {
    const a = audio.current;
    if (!a.buffers[t]) a.buffers[t] = makeBuffer(t);
    return a.buffers[t];
  };

  const stopNoise = () => {
    const a = audio.current;
    a.sources.forEach((s) => { try { s.stop(); } catch (e) {} });
    a.sources = [];
    a.masterGain = null;
    if (a.dropTimer) { clearInterval(a.dropTimer); a.dropTimer = null; }
  };

  const startNoise = (type) => {
    const a = audio.current;
    const ctx = getCtx();
    stopNoise();
    const t = type || noiseType;
    const master = ctx.createGain();
    master.gain.value = mutedRef.current ? 0 : volRef.current;
    master.connect(ctx.destination);
    a.masterGain = master;
    const loopSrc = (buf) => {
      const s = ctx.createBufferSource();
      s.buffer = buf; s.loop = true;
      a.sources.push(s); return s;
    };
    if (t === "brown") {
      const src = loopSrc(getBuf("brown"));
      src.connect(master); src.start();
    } else {
      const bed = loopSrc(getBuf("pink"));
      const bedLp = ctx.createBiquadFilter();
      bedLp.type = "lowpass"; bedLp.frequency.value = 1300;
      const bedG = ctx.createGain(); bedG.gain.value = 0.9;
      bed.connect(bedLp); bedLp.connect(bedG); bedG.connect(master); bed.start();
      const hiss = loopSrc(getBuf("white"));
      const bp = ctx.createBiquadFilter();
      bp.type = "bandpass"; bp.frequency.value = 5200; bp.Q.value = 0.8;
      const hissG = ctx.createGain(); hissG.gain.value = 0.1;
      hiss.connect(bp); bp.connect(hissG); hissG.connect(master); hiss.start();
      a.dropTimer = setInterval(() => {
        if (!a.masterGain) return;
        const n = 1 + Math.floor(Math.random() * 3);
        for (let i = 0; i < n; i++) {
          const t0 = ctx.currentTime + Math.random() * 0.12;
          const o = ctx.createOscillator(); o.type = "sine";
          const f = 500 + Math.random() * 2200;
          o.frequency.setValueAtTime(f, t0);
          o.frequency.exponentialRampToValueAtTime(f * 0.6, t0 + 0.06);
          const g = ctx.createGain();
          const v = 0.04 + Math.random() * 0.1;
          g.gain.setValueAtTime(0.0001, t0);
          g.gain.exponentialRampToValueAtTime(v, t0 + 0.005);
          g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.05 + Math.random() * 0.06);
          o.connect(g); g.connect(a.masterGain);
          o.start(t0); o.stop(t0 + 0.18);
        }
      }, 130);
    }
  };

  const playClick = () => {
    if (mutedRef.current) return;
    try {
      const ctx = getCtx();
      const t = ctx.currentTime;
      const n = Math.floor(ctx.sampleRate * 0.005);
      const buf = ctx.createBuffer(1, n, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, 6);
      const src = ctx.createBufferSource(); src.buffer = buf;
      const bp = ctx.createBiquadFilter(); bp.type = "bandpass"; bp.frequency.value = 4000; bp.Q.value = 1.8;
      const g1 = ctx.createGain(); g1.gain.value = 0.7;
      src.connect(bp); bp.connect(g1); g1.connect(ctx.destination); src.start(t);
      const osc = ctx.createOscillator(); osc.type = "sine"; osc.frequency.value = 3500;
      const g2 = ctx.createGain();
      g2.gain.setValueAtTime(0.18, t); g2.gain.exponentialRampToValueAtTime(0.0001, t + 0.012);
      osc.connect(g2); g2.connect(ctx.destination); osc.start(t); osc.stop(t + 0.015);
      const osc2 = ctx.createOscillator(); osc2.type = "sine"; osc2.frequency.value = 800;
      const g3 = ctx.createGain();
      g3.gain.setValueAtTime(0.06, t); g3.gain.exponentialRampToValueAtTime(0.0001, t + 0.008);
      osc2.connect(g3); g3.connect(ctx.destination); osc2.start(t); osc2.stop(t + 0.01);
    } catch (e) {}
  };

  const playAlert = () => {
    if (mutedRef.current) return;
    try {
      const ctx = getCtx();
      const t0 = ctx.currentTime;
      [[880,0],[659.25,0.45],[880,1.1],[659.25,1.55]].forEach(([f,dt]) => {
        const o = ctx.createOscillator(); o.type = "sine"; o.frequency.value = f;
        const g = ctx.createGain();
        g.gain.setValueAtTime(0.0001, t0+dt); g.gain.exponentialRampToValueAtTime(0.4, t0+dt+0.02);
        g.gain.exponentialRampToValueAtTime(0.0005, t0+dt+0.6);
        o.connect(g); g.connect(ctx.destination); o.start(t0+dt); o.stop(t0+dt+0.7);
      });
    } catch (e) {}
  };

  /* ---------------- 计时 ---------------- */
  useEffect(() => {
    if (!running) return;
    const id = setInterval(() => {
      const rem = Math.max(0, Math.ceil((endRef.current - Date.now()) / 1000));
      setTimeLeft(rem);
    }, 250);
    return () => clearInterval(id);
  }, [running]);

  useEffect(() => {
    if (running && timeLeft === 0) {
      setRunning(false); setLocked(false); stopNoise(); playAlert();
      if (mode === "work") {
        const now = new Date();
        const entry = {
          date: todayStr(),
          time: `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`,
          min: workMin,
          task: task.trim() || "未命名任务",
        };
        setCount((c) => { const n = c+1; saveCount(n); return n; });
        setHistory((h) => { const n = [entry,...h].slice(0,50); saveHistory(n); return n; });
      }
    }
  }, [timeLeft, running]); // eslint-disable-line

  useEffect(() => {
    const a = audio.current;
    if (a.masterGain) a.masterGain.gain.value = muted ? 0 : volume;
  }, [volume, muted]);

  /* ---------------- 持久化 ---------------- */
  useEffect(() => {
    (async () => {
      try {
        const v = await storageHelper.get("pomodoro-stats");
        if (v) { const s = JSON.parse(v); if (s.date === todayStr()) setCount(s.count || 0); }
      } catch (e) {}
      try {
        const h = await storageHelper.get("pomodoro-history");
        if (h) setHistory(JSON.parse(h) || []);
      } catch (e) {}
    })();
  }, []);

  const saveCount = async (c) => {
    try { await storageHelper.set("pomodoro-stats", JSON.stringify({ date: todayStr(), count: c })); } catch (e) {}
  };
  const saveHistory = async (h) => {
    try { await storageHelper.set("pomodoro-history", JSON.stringify(h)); } catch (e) {}
  };
  const clearHistory = () => {
    playClick();
    setHistory([]);
    saveHistory([]);
  };

  /* ---------------- 交互 ---------------- */
  const togglePlay = () => {
    playClick();
    if (running) { setRunning(false); stopNoise(); }
    else {
      const t = timeLeft === 0 ? curDuration : timeLeft;
      if (timeLeft === 0) { setTimeLeft(curDuration); setTotal(curDuration); }
      endRef.current = Date.now() + t * 1000;
      setLocked(true); setRunning(true); startNoise();
    }
  };

  const reset = () => { setRunning(false); setLocked(false); stopNoise(); setTimeLeft(curDuration); setTotal(curDuration); };
  const handleResetClick = () => { playClick(); setShowResetConfirm(true); };
  const confirmReset = () => { playClick(); setShowResetConfirm(false); reset(); };
  const cancelReset = () => { playClick(); setShowResetConfirm(false); };

  const switchMode = (m) => {
    if (locked) return;
    playClick();
    if (m === mode) return;
    setRunning(false); stopNoise(); setMode(m);
    const dur = (m === "work" ? workMin : breakMin) * 60;
    setTimeLeft(dur); setTotal(dur);
  };

  const toggleMute = () => {
    const next = !muted; setMuted(next); mutedRef.current = next;
    if (!next) playClick();
  };

  const changeNoise = (t) => {
    if (t === noiseType) return;
    playClick(); setNoiseType(t);
    if (running) startNoise(t);
  };

  const onWorkChange = (v) => {
    setWorkStr(v);
    const n = parseInt(v, 10);
    if (!running && mode === "work" && Number.isFinite(n) && n >= 1) {
      const s = Math.min(180, n) * 60; setTimeLeft(s); setTotal(s);
    }
  };
  const onBreakChange = (v) => {
    setBreakStr(v);
    const n = parseInt(v, 10);
    if (!running && mode === "break" && Number.isFinite(n) && n >= 1) {
      const s = Math.min(180, n) * 60; setTimeLeft(s); setTotal(s);
    }
  };

  const applyPreset = (w, b) => {
    if (locked) return;
    playClick();
    setWorkStr(String(w));
    setBreakStr(String(b));
    if (!running) {
      const s = (mode === "work" ? w : b) * 60;
      setTimeLeft(s); setTotal(s);
    }
  };

  const fmt = `${String(Math.floor(timeLeft/60)).padStart(2,"0")}:${String(timeLeft%60).padStart(2,"0")}`;
  const frac = total > 0 ? Math.max(0, Math.min(1, timeLeft/total)) : 0;

  return (
    <div className="min-h-screen w-full flex justify-center relative overflow-hidden" style={{ background: BG }}>
      <Clawd />
      <div className="w-full flex flex-col items-center px-4 py-4 relative" style={{ maxWidth: 390, zIndex: 1 }}>

        {/* 当前任务 */}
        <div className="w-full relative mb-3">
          <input
            type="text" value={task} disabled={locked} maxLength={40}
            onChange={(e) => setTask(e.target.value)}
            placeholder="输入当前任务…"
            className="w-full rounded-xl px-4 py-3 text-center outline-none transition-opacity"
            style={{ background: CARD, color: "#E8E6DF", fontSize: 18, opacity: locked ? 0.6 : 1, cursor: locked ? "not-allowed" : "text" }}
          />
          {locked && <Lock size={12} style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", color: ORANGE }} />}
        </div>

        {/* 计时圆盘 */}
        <div className="relative flex items-center justify-center select-none" style={{ width: 244, height: 244 }}>
          <svg width="244" height="244" viewBox="0 0 244 244" style={{ position: "absolute", inset: 0 }}>
            <circle cx="122" cy="122" r={RING_R} fill="none" stroke="rgba(255,255,255,0.12)" strokeWidth="4" />
            <circle cx="122" cy="122" r={RING_R} fill="none" stroke="#FFFFFF" strokeWidth="4"
              strokeDasharray={RING_C} strokeDashoffset={RING_C * (1 - frac)}
              transform="translate(244 0) scale(-1 1) rotate(-90 122 122)"
              style={{ transition: "stroke-dashoffset .3s linear" }}
            />
          </svg>
          <div className="rounded-full flex flex-col items-center justify-center"
            style={{ width: 210, height: 210, background: ORANGE, boxShadow: running ? `0 0 50px ${ORANGE}55` : "none", transition: "box-shadow .4s" }}>
            <div className="text-white font-extrabold" style={{ fontSize: 50, lineHeight: 1, letterSpacing: 1 }}>{fmt}</div>
            <div className="text-white mt-2" style={{ opacity: 0.92, fontSize: 16 }}>{mode === "work" ? "工作" : "休息"}</div>
          </div>
        </div>

        {/* 模式切换 */}
        <div className="flex gap-3 mt-4 w-full" style={{ opacity: locked ? 0.55 : 1, transition: "opacity .2s" }}>
          {[["work","工作"],["break","休息"]].map(([m, label]) => (
            <button key={m} onClick={() => switchMode(m)} disabled={locked}
              className="flex-1 py-2 rounded-xl font-medium transition-all"
              style={{ background: mode === m ? ORANGE : BTN, color: mode === m ? "#fff" : TEXT_DIM, fontSize: 15, cursor: locked ? "not-allowed" : "pointer" }}>
              {label}
            </button>
          ))}
        </div>

        {/* 控制按钮 */}
        <div className="flex gap-5 mt-4">
          <button onClick={togglePlay} className="rounded-full flex items-center justify-center transition-transform active-scale-90"
            style={{ width: 52, height: 52, background: BTN, color: "#E8E6DF" }} aria-label={running ? "暂停" : "开始"}>
            {running ? <Pause size={20} /> : <Play size={20} style={{ marginLeft: 2 }} />}
          </button>
          <button onClick={handleResetClick} className="rounded-full flex items-center justify-center transition-transform active-scale-90"
            style={{ width: 52, height: 52, background: BTN, color: "#E8E6DF" }} aria-label="重置">
            <RotateCcw size={19} />
          </button>
          <button onClick={toggleMute} className="rounded-full flex items-center justify-center transition-transform active-scale-90"
            style={{ width: 52, height: 52, background: muted ? ORANGE : BTN, color: muted ? "#fff" : "#E8E6DF" }} aria-label={muted ? "取消静音" : "静音"}>
            {muted ? <VolumeX size={19} /> : <Volume2 size={19} />}
          </button>
        </div>

        {/* 背景音卡片 */}
        <div className="w-full rounded-2xl p-4 mt-4" style={{ background: CARD }}>
          <div className="flex items-center justify-between gap-4">
            <span style={{ color: "#E8E6DF", fontSize: 14, whiteSpace: "nowrap" }}>背景音</span>
            <div className="relative flex-1 rounded-xl" style={{ background: BTN, height: 38, maxWidth: 220 }}>
              <div className="absolute rounded-lg"
                style={{ top: 4, bottom: 4, left: noiseType === "rain" ? 4 : "calc(50% + 2px)", width: "calc(50% - 6px)", background: ORANGE, transition: "left .25s cubic-bezier(.4,0,.2,1)" }}
              />
              <div className="absolute inset-0 flex">
                <button onClick={() => changeNoise("rain")} className="flex-1 flex items-center justify-center"
                  style={{ color: noiseType === "rain" ? "#fff" : TEXT_DIM, fontSize: 13, background: "transparent", zIndex: 1 }}>雨声</button>
                <button onClick={() => changeNoise("brown")} className="flex-1 flex items-center justify-center"
                  style={{ color: noiseType === "brown" ? "#fff" : TEXT_DIM, fontSize: 13, background: "transparent", zIndex: 1 }}>棕噪音</button>
              </div>
            </div>
          </div>
          <div className="flex items-center gap-3 mt-3">
            <span style={{ color: TEXT_DIM, fontSize: 13, whiteSpace: "nowrap" }}>音量</span>
            <input type="range" min="0" max="1" step="0.01" value={volume}
              onChange={(e) => setVolume(parseFloat(e.target.value))}
              className="w-full" style={{ height: 4 }} />
          </div>
        </div>

        {/* 时间设置卡片 */}
        <div className="w-full rounded-2xl p-4 mt-3" style={{ background: CARD }}>
          {/* 快捷预设按钮 */}
          <div className="flex gap-2 mb-4">
            {[["25:5", 25, 5], ["50:10", 50, 10], ["90:20", 90, 20]].map(([label, w, b]) => (
              <button
                key={label}
                onClick={() => applyPreset(w, b)}
                disabled={locked}
                className="flex-1 py-1.5 px-4 rounded-xl font-medium transition-all active-scale-95"
                style={{
                  background: BTN,
                  color: "#E8E6DF",
                  fontSize: 13,
                  cursor: locked ? "not-allowed" : "pointer",
                  opacity: locked ? 0.5 : 1,
                  letterSpacing: 0.5,
                }}
              >
                {label}
              </button>
            ))}
          </div>

          {/* 时长输入框 */}
          <div className="flex gap-3">
            <div className="flex-1">
              <div style={{ color: TEXT_DIM, fontSize: 13, marginBottom: 6 }}>工作时间（分钟）</div>
              <input type="number" min="1" max="180" value={workStr}
                onChange={(e) => onWorkChange(e.target.value)}
                onBlur={() => setWorkStr(String(workMin))}
                className="w-full rounded-xl px-3 py-2 outline-none"
                style={{ background: BTN, color: "#E8E6DF", fontSize: 15 }} />
            </div>
            <div className="flex-1">
              <div style={{ color: TEXT_DIM, fontSize: 13, marginBottom: 6 }}>休息时间（分钟）</div>
              <input type="number" min="1" max="180" value={breakStr}
                onChange={(e) => onBreakChange(e.target.value)}
                onBlur={() => setBreakStr(String(breakMin))}
                className="w-full rounded-xl px-3 py-2 outline-none"
                style={{ background: BTN, color: "#E8E6DF", fontSize: 15 }} />
            </div>
          </div>
        </div>

        {/* 今日统计 */}
        <div className="w-full flex items-center justify-between mt-4 px-1">
          <div className="flex items-center gap-2">
            <span style={{ fontSize: 22 }}>🍅</span>
            <div>
              <div style={{ color: TEXT_DIM, fontSize: 11 }}>今日完成的番茄钟数</div>
              <div className="font-extrabold" style={{ color: "#E8E6DF", fontSize: 24, lineHeight: 1.1 }}>{count}</div>
            </div>
          </div>
        </div>

        {/* 历史记录 */}
        <div className="w-full rounded-2xl mt-3 mb-4" style={{ background: CARD }}>
          <button onClick={() => { playClick(); setShowHistory((s) => !s); }}
            className="w-full flex items-center justify-between px-4 py-3"
            style={{ color: "#E8E6DF", fontSize: 14, background: "transparent" }}>
            <span>历史记录{history.length > 0 ? `（${history.length}）` : ""}</span>
            {showHistory ? <ChevronUp size={17} color={TEXT_DIM} /> : <ChevronDown size={17} color={TEXT_DIM} />}
          </button>
          {showHistory && (
            <div className="px-4 pb-3">
              {history.length === 0 ? (
                <div className="text-center py-3" style={{ color: TEXT_DIM, fontSize: 13 }}>还没有完成的番茄钟，开始第一个吧 🍅</div>
              ) : (
                <>
                  <div style={{ maxHeight: 180, overflowY: "auto" }}>
                    {history.map((h, i) => (
                      <div key={i} className="flex items-center gap-3 py-2" style={{ borderTop: i === 0 ? "none" : `1px solid ${BTN}` }}>
                        <span style={{ fontSize: 15 }}>🍅</span>
                        <div className="flex-1 min-w-0">
                          <div className="ellipsis" style={{ color: "#E8E6DF", fontSize: 13 }}>{h.task}</div>
                          <div style={{ color: TEXT_DIM, fontSize: 11, marginTop: 1 }}>{h.date} {h.time} · {h.min} 分钟</div>
                        </div>
                      </div>
                    ))}
                  </div>
                  <button onClick={clearHistory}
                    className="w-full flex items-center justify-center gap-1 mt-2 py-2 rounded-xl"
                    style={{ background: BTN, color: TEXT_DIM, fontSize: 12 }}>
                    <Trash2 size={12} /> 清空历史记录
                  </button>
                </>
              )}
            </div>
          )}
        </div>
      </div>

      {/* 重置确认弹窗 */}
      {showResetConfirm && (
        <div className="fixed inset-0 flex items-center justify-center"
          style={{ background: "rgba(0,0,0,0.55)", zIndex: 1000 }} onClick={cancelReset}>
          <div className="rounded-2xl p-6 flex flex-col items-center gap-4"
            style={{ background: CARD, width: 280, boxShadow: "0 8px 40px rgba(0,0,0,0.5)" }}
            onClick={(e) => e.stopPropagation()}>
            <div style={{ fontSize: 32 }}>⏱️</div>
            <div className="text-center">
              <div className="font-bold" style={{ color: "#E8E6DF", fontSize: 16, marginBottom: 6 }}>确定要重置吗？</div>
              <div style={{ color: TEXT_DIM, fontSize: 13 }}>当前进度将会清空。</div>
            </div>
            <div className="flex gap-3 w-full">
              <button onClick={cancelReset} className="flex-1 py-2 rounded-xl font-medium"
                style={{ background: BTN, color: TEXT_DIM, fontSize: 14 }}>取消</button>
              <button onClick={confirmReset} className="flex-1 py-2 rounded-xl font-medium"
                style={{ background: ORANGE, color: "#fff", fontSize: 14 }}>确认重置</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<PomodoroApp />);
</script>
</body>
</html>
