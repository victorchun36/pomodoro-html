<!DOCTYPE html>
<html lang="zh">
<head>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍠</text></svg>" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>番薯钟</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍠</text></svg>" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1C1B17; min-height: 100vh; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=range] { cursor: pointer; }
    button { border: none; cursor: pointer; }
    input { border: none; }
    .btn-press { transition: transform .1s; }
    .btn-press:active { transform: scale(0.9); }
    .btn-press-sm { transition: transform .1s; }
    .btn-press-sm:active { transform: scale(0.95); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const ORANGE = "#D2613C";
    const BG = "#1C1B17";
    const CARD = "#27261F";
    const BTN = "#2F2E27";
    const TEXT_DIM = "#8E8C84";
    const RING_R = 116;
    const RING_C = 2 * Math.PI * RING_R;

    const todayStr = () => {
      const d = new Date();
      return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
    };

    const fmtShortDate = (dateStr, timeStr) => {
      const [, m, day] = dateStr.split("-");
      return `${String(m).padStart(2,"0")}-${String(day).padStart(2,"0")} ${timeStr}`;
    };

    const fmtDuration = (min) => {
      if (min < 60) return `${min}m`;
      const h = Math.floor(min / 60);
      const rem = min % 60;
      return rem === 0 ? `${h}h` : `${h}h${rem}m`;
    };

    // 总时长中文格式：0分钟 / 30分钟 / 1小时 / 1小时30分钟
    const fmtTotalCN = (min) => {
      if (min <= 0) return "0分钟";
      const h = Math.floor(min / 60);
      const m = min % 60;
      if (h === 0) return `${m}分钟`;
      if (m === 0) return `${h}小时`;
      return `${h}小时${m}分钟`;
    };

    // 图标数据内联（来自 lucide 0.383.0），不依赖任何外部 CDN，保证一定能渲染。
    const ICONS = {
      Play: [["polygon",{points:"6 3 20 12 6 21 6 3"}]],
      Pause: [["rect",{x:"14",y:"4",width:"4",height:"16",rx:"1"}],["rect",{x:"6",y:"4",width:"4",height:"16",rx:"1"}]],
      RotateCcw: [["path",{d:"M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"}],["path",{d:"M3 3v5h5"}]],
      Volume2: [["polygon",{points:"11 5 6 9 2 9 2 15 6 15 11 19 11 5"}],["path",{d:"M15.54 8.46a5 5 0 0 1 0 7.07"}],["path",{d:"M19.07 4.93a10 10 0 0 1 0 14.14"}]],
      VolumeX: [["polygon",{points:"11 5 6 9 2 9 2 15 6 15 11 19 11 5"}],["line",{x1:"22",x2:"16",y1:"9",y2:"15"}],["line",{x1:"16",x2:"22",y1:"9",y2:"15"}]],
      Lock: [["rect",{width:"18",height:"11",x:"3",y:"11",rx:"2",ry:"2"}],["path",{d:"M7 11V7a5 5 0 0 1 10 0v4"}]],
      ChevronDown: [["path",{d:"m6 9 6 6 6-6"}]],
      ChevronUp: [["path",{d:"m18 15-6-6-6 6"}]],
      Trash2: [["path",{d:"M3 6h18"}],["path",{d:"M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"}],["path",{d:"M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"}],["line",{x1:"10",x2:"10",y1:"11",y2:"17"}],["line",{x1:"14",x2:"14",y1:"11",y2:"17"}]],
    };
    const LucideIcon = ({ data, size = 24, color = "currentColor", style }) =>
      data ? React.createElement(
        "svg",
        { xmlns:"http://www.w3.org/2000/svg", width:size, height:size, viewBox:"0 0 24 24",
          fill:"none", stroke:color, strokeWidth:2, strokeLinecap:"round", strokeLinejoin:"round", style },
        data.map(([tag, attrs], i) => React.createElement(tag, { key:i, ...attrs }))
      ) : null;
    const mkIcon = (name) => (props) => <LucideIcon data={ICONS[name]} {...props} />;

    const Clawd = () => (
      <>
        <style>{`
          @keyframes clawd-walk { 0% { transform: translateX(-90px); } 100% { transform: translateX(calc(100vw + 90px)); } }
          @keyframes clawd-bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
          @keyframes snipL { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(-12deg); } }
          @keyframes snipR { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(12deg); } }
          .clawd-walk { animation: clawd-walk 40s linear infinite; }
          .clawd-bob { animation: clawd-bob 0.5s ease-in-out infinite; }
          .claw { transform-box: fill-box; }
          .claw-l { transform-origin: 90% 85%; animation: snipL 1.3s ease-in-out infinite; }
          .claw-r { transform-origin: 10% 85%; animation: snipR 1.3s ease-in-out infinite; }
        `}</style>
        <div className="clawd-walk" style={{ position:"fixed", bottom:6, left:0, zIndex:9999, pointerEvents:"none", opacity:0.9 }}>
          <div className="clawd-bob">
            <svg width="78" height="65" viewBox="0 0 24 20" shapeRendering="crispEdges">
              <g className="claw claw-l">
                <rect x="0" y="3" width="4" height="2" fill="#E2795B"/>
                <rect x="0" y="6" width="4" height="1" fill="#E2795B"/>
                <rect x="2" y="5" width="3" height="3" fill="#D2613C"/>
              </g>
              <g className="claw claw-r">
                <rect x="20" y="3" width="4" height="2" fill="#E2795B"/>
                <rect x="20" y="6" width="4" height="1" fill="#E2795B"/>
                <rect x="19" y="5" width="3" height="3" fill="#D2613C"/>
              </g>
              <rect x="5" y="7" width="1" height="2" fill="#C05B3F"/>
              <rect x="18" y="7" width="1" height="2" fill="#C05B3F"/>
              <rect x="7" y="8" width="10" height="1" fill="#E2795B"/>
              <rect x="6" y="9" width="12" height="6" fill="#E2795B"/>
              <rect x="7" y="15" width="10" height="1" fill="#D2613C"/>
              <rect x="9" y="10" width="2" height="2" fill="#FFFFFF"/>
              <rect x="13" y="10" width="2" height="2" fill="#FFFFFF"/>
              <rect x="10" y="11" width="1" height="1" fill="#1C1B17"/>
              <rect x="14" y="11" width="1" height="1" fill="#1C1B17"/>
              <rect x="11" y="13" width="2" height="1" fill="#C05B3F"/>
              <rect x="7" y="16" width="1" height="2" fill="#C05B3F"/>
              <rect x="10" y="16" width="1" height="2" fill="#C05B3F"/>
              <rect x="13" y="16" width="1" height="2" fill="#C05B3F"/>
              <rect x="16" y="16" width="1" height="2" fill="#C05B3F"/>
            </svg>
          </div>
        </div>
      </>
    );

    function PomodoroApp() {
      const [mode, setMode] = useState("work");
      const [workStr, setWorkStr] = useState("25");
      const [breakStr, setBreakStr] = useState("5");
      const [timeLeft, setTimeLeft] = useState(25 * 60);
      const [total, setTotal] = useState(25 * 60);
      const [running, setRunning] = useState(false);
      const [locked, setLocked] = useState(false);
      const [muted, setMuted] = useState(false);
      const [volume, setVolume] = useState(0.3);
      const [noiseType, setNoiseType] = useState("rain");
      const [count, setCount] = useState(0);
      const [task, setTask] = useState("");
      const [history, setHistory] = useState([]);
      const [showHistory, setShowHistory] = useState(false);
      const [showResetConfirm, setShowResetConfirm] = useState(false);

      const audio = useRef({ ctx:null, sources:[], masterGain:null, dropTimer:null, buffers:{} });
      const endRef = useRef(null);
      const mutedRef = useRef(muted); mutedRef.current = muted;
      const volRef = useRef(volume); volRef.current = volume;

      const parseMin = (s, fb) => { const n = parseInt(s,10); return Number.isFinite(n)&&n>=1 ? Math.min(180,n) : fb; };
      const workMin = parseMin(workStr, 25);
      const breakMin = parseMin(breakStr, 5);
      const curDuration = (mode==="work" ? workMin : breakMin) * 60;

      // 记录"番茄启动那一刻"的工作时长（分钟），用于历史与总时长统计，
      // 这样即使运行/暂停中改了设置，也只影响下一个番茄，不会记错当前这条。
      const activeWorkMinRef = useRef(workMin);

      const getCtx = () => {
        const a = audio.current;
        if (!a.ctx) a.ctx = new (window.AudioContext||window.webkitAudioContext)();
        if (a.ctx.state==="suspended") a.ctx.resume();
        return a.ctx;
      };

      const makeBuffer = (type) => {
        const ctx = getCtx(); const len = ctx.sampleRate*2;
        const buf = ctx.createBuffer(1,len,ctx.sampleRate); const d = buf.getChannelData(0);
        if (type==="white") { for (let i=0;i<len;i++) d[i]=Math.random()*2-1; }
        else if (type==="brown") { let last=0; for (let i=0;i<len;i++){const w=Math.random()*2-1;last=(last+0.02*w)/1.02;d[i]=last*3.5;} }
        else { let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0; for(let i=0;i<len;i++){const w=Math.random()*2-1;b0=0.99886*b0+w*0.0555179;b1=0.99332*b1+w*0.0750759;b2=0.969*b2+w*0.153852;b3=0.8665*b3+w*0.3104856;b4=0.55*b4+w*0.5329522;b5=-0.7616*b5-w*0.016898;d[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11;b6=w*0.115926;} }
        return buf;
      };

      const getBuf = (t) => { const a=audio.current; if(!a.buffers[t]) a.buffers[t]=makeBuffer(t); return a.buffers[t]; };

      const stopNoise = () => {
        const a=audio.current; a.sources.forEach(s=>{try{s.stop();}catch(e){}});
        a.sources=[]; a.masterGain=null;
        if(a.dropTimer){clearInterval(a.dropTimer);a.dropTimer=null;}
      };

      const startNoise = (type) => {
        const a=audio.current; const ctx=getCtx(); stopNoise();
        const t=type||noiseType;
        const master=ctx.createGain(); master.gain.value=mutedRef.current?0:volRef.current;
        master.connect(ctx.destination); a.masterGain=master;
        const loopSrc=(buf)=>{const s=ctx.createBufferSource();s.buffer=buf;s.loop=true;a.sources.push(s);return s;};
        if(t==="brown"){const src=loopSrc(getBuf("brown"));src.connect(master);src.start();}
        else {
          const bed=loopSrc(getBuf("pink")); const bedLp=ctx.createBiquadFilter(); bedLp.type="lowpass"; bedLp.frequency.value=1300;
          const bedG=ctx.createGain(); bedG.gain.value=0.9; bed.connect(bedLp);bedLp.connect(bedG);bedG.connect(master);bed.start();
          const hiss=loopSrc(getBuf("white")); const bp=ctx.createBiquadFilter(); bp.type="bandpass"; bp.frequency.value=5200; bp.Q.value=0.8;
          const hissG=ctx.createGain(); hissG.gain.value=0.1; hiss.connect(bp);bp.connect(hissG);hissG.connect(master);hiss.start();
          a.dropTimer=setInterval(()=>{
            if(!a.masterGain)return; const n=1+Math.floor(Math.random()*3);
            for(let i=0;i<n;i++){const t0=ctx.currentTime+Math.random()*0.12;const o=ctx.createOscillator();o.type="sine";const f=500+Math.random()*2200;o.frequency.setValueAtTime(f,t0);o.frequency.exponentialRampToValueAtTime(f*0.6,t0+0.06);const g=ctx.createGain();const v=0.04+Math.random()*0.1;g.gain.setValueAtTime(0.0001,t0);g.gain.exponentialRampToValueAtTime(v,t0+0.005);g.gain.exponentialRampToValueAtTime(0.0001,t0+0.05+Math.random()*0.06);o.connect(g);g.connect(a.masterGain);o.start(t0);o.stop(t0+0.18);}
          },130);
        }
      };

      const playClick = () => {
        if(mutedRef.current)return;
        try{
          const ctx=getCtx();const t=ctx.currentTime;const n=Math.floor(ctx.sampleRate*0.005);
          const buf=ctx.createBuffer(1,n,ctx.sampleRate);const d=buf.getChannelData(0);
          for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/n,6);
          const src=ctx.createBufferSource();src.buffer=buf;
          const bp=ctx.createBiquadFilter();bp.type="bandpass";bp.frequency.value=4000;bp.Q.value=1.8;
          const g1=ctx.createGain();g1.gain.value=0.7;src.connect(bp);bp.connect(g1);g1.connect(ctx.destination);src.start(t);
          const osc=ctx.createOscillator();osc.type="sine";osc.frequency.value=3500;
          const g2=ctx.createGain();g2.gain.setValueAtTime(0.18,t);g2.gain.exponentialRampToValueAtTime(0.0001,t+0.012);
          osc.connect(g2);g2.connect(ctx.destination);osc.start(t);osc.stop(t+0.015);
          const osc2=ctx.createOscillator();osc2.type="sine";osc2.frequency.value=800;
          const g3=ctx.createGain();g3.gain.setValueAtTime(0.06,t);g3.gain.exponentialRampToValueAtTime(0.0001,t+0.008);
          osc2.connect(g3);g3.connect(ctx.destination);osc2.start(t);osc2.stop(t+0.01);
        }catch(e){}
      };

      const playAlert = () => {
        if(mutedRef.current)return;
        try{
          const ctx=getCtx();const t0=ctx.currentTime;
          [[880,0],[659.25,0.45],[880,1.1],[659.25,1.55],[880,2.2],[659.25,2.65]].forEach(([f,dt])=>{
            const o=ctx.createOscillator();o.type="sine";o.frequency.value=f;
            const g=ctx.createGain();g.gain.setValueAtTime(0.0001,t0+dt);g.gain.exponentialRampToValueAtTime(0.4,t0+dt+0.02);g.gain.exponentialRampToValueAtTime(0.0005,t0+dt+0.6);
            o.connect(g);g.connect(ctx.destination);o.start(t0+dt);o.stop(t0+dt+0.7);
          });
        }catch(e){}
      };

      useEffect(()=>{
        if(!running)return;
        const id=setInterval(()=>{const rem=Math.max(0,Math.ceil((endRef.current-Date.now())/1000));setTimeLeft(rem);},250);
        return()=>clearInterval(id);
      },[running]);

      useEffect(()=>{
        if(running&&timeLeft===0){
          setRunning(false);setLocked(false);stopNoise();playAlert();
          if(mode==="work"){
            const now=new Date();
            const entry={date:todayStr(),time:`${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`,min:activeWorkMinRef.current,task:task.trim()||"未命名任务"};
            setCount(c=>{const n=c+1;sessionStorage.setItem("pomodoro-count",String(n));return n;});
            setHistory(h=>{const n=[entry,...h].slice(0,50);sessionStorage.setItem("pomodoro-history",JSON.stringify(n));return n;});
            // 工作结束 → 自动切到休息（只切换模式与时长，不自动开始）
            setMode("break");const bd=breakMin*60;setTimeLeft(bd);setTotal(bd);
          } else {
            // 休息结束 → 自动切回工作（只切换模式与时长，不自动开始）
            setMode("work");const wd=workMin*60;setTimeLeft(wd);setTotal(wd);
          }
        }
      },[timeLeft,running]);

      useEffect(()=>{const a=audio.current;if(a.masterGain)a.masterGain.gain.value=muted?0:volume;},[volume,muted]);

      useEffect(()=>{
        try{const c=sessionStorage.getItem("pomodoro-count");if(c!==null)setCount(parseInt(c,10)||0);}catch(e){}
        try{const h=sessionStorage.getItem("pomodoro-history");if(h)setHistory(JSON.parse(h)||[]);}catch(e){}
      },[]);

      const clearHistory=()=>{playClick();setHistory([]);setCount(0);sessionStorage.removeItem("pomodoro-history");sessionStorage.removeItem("pomodoro-count");};

      const togglePlay=()=>{
        playClick();
        if(running){setRunning(false);stopNoise();}
        else{
          // 全新开始（而非暂停后继续）时，捕获本番茄启动那一刻的工作时长
          if(!locked&&mode==="work")activeWorkMinRef.current=workMin;
          const t=timeLeft===0?curDuration:timeLeft;if(timeLeft===0){setTimeLeft(curDuration);setTotal(curDuration);}endRef.current=Date.now()+t*1000;setLocked(true);setRunning(true);startNoise();
        }
      };

      const reset=()=>{setRunning(false);setLocked(false);stopNoise();setTimeLeft(curDuration);setTotal(curDuration);};
      const handleResetClick=()=>{playClick();setShowResetConfirm(true);};
      const confirmReset=()=>{playClick();setShowResetConfirm(false);reset();};
      const cancelReset=()=>{playClick();setShowResetConfirm(false);};

      const switchMode=(m)=>{if(locked)return;playClick();if(m===mode)return;setRunning(false);stopNoise();setMode(m);const dur=(m==="work"?workMin:breakMin)*60;setTimeLeft(dur);setTotal(dur);};
      const toggleMute=()=>{const next=!muted;setMuted(next);mutedRef.current=next;if(!next)playClick();};
      const changeNoise=(t)=>{if(t===noiseType)return;playClick();setNoiseType(t);if(running)startNoise(t);};

      const onWorkChange=(v)=>{setWorkStr(v);const n=parseInt(v,10);if(!locked&&mode==="work"&&Number.isFinite(n)&&n>=1){const s=Math.min(180,n)*60;setTimeLeft(s);setTotal(s);}};
      const onBreakChange=(v)=>{setBreakStr(v);const n=parseInt(v,10);if(!locked&&mode==="break"&&Number.isFinite(n)&&n>=1){const s=Math.min(180,n)*60;setTimeLeft(s);setTotal(s);}};
      const applyPreset=(w,b)=>{playClick();setWorkStr(String(w));setBreakStr(String(b));if(!locked){const s=(mode==="work"?w:b)*60;setTimeLeft(s);setTotal(s);}};

      const fmt=`${String(Math.floor(timeLeft/60)).padStart(2,"0")}:${String(timeLeft%60).padStart(2,"0")}`;
      const frac=total>0?Math.max(0,Math.min(1,timeLeft/total)):0;
      const totalMin=history.reduce((s,h)=>s+(h.min||0),0);

      const Play = mkIcon("Play"), Pause = mkIcon("Pause"), RotateCcw = mkIcon("RotateCcw"),
            Volume2 = mkIcon("Volume2"), VolumeX = mkIcon("VolumeX"), Lock = mkIcon("Lock"),
            ChevronDown = mkIcon("ChevronDown"), ChevronUp = mkIcon("ChevronUp"), Trash2 = mkIcon("Trash2");

      return (
        <div style={{ minHeight:"100vh", width:"100%", display:"flex", justifyContent:"center", position:"relative", overflow:"hidden", background:BG, fontFamily:"system-ui,-apple-system,sans-serif" }}>
          <Clawd/>
          <div style={{ width:"100%", maxWidth:390, display:"flex", flexDirection:"column", alignItems:"center", padding:"16px", position:"relative", zIndex:1 }}>

            {/* 当前任务 */}
            <div style={{ width:"100%", position:"relative", marginBottom:12 }}>
              <input type="text" value={task} disabled={locked} maxLength={40} onChange={e=>setTask(e.target.value)} placeholder="输入当前任务…"
                style={{ width:"100%", borderRadius:12, padding:"12px 16px", textAlign:"center", outline:"none", background:CARD, color:"#E8E6DF", fontSize:18, opacity:locked?0.6:1, cursor:locked?"not-allowed":"text" }}/>
              {locked && <span style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)" }}><Lock size={12} color={ORANGE}/></span>}
            </div>

            {/* 计时圆盘 */}
            <div style={{ position:"relative", display:"flex", alignItems:"center", justifyContent:"center", width:244, height:244, userSelect:"none" }}>
              <svg width="244" height="244" viewBox="0 0 244 244" style={{ position:"absolute", inset:0 }}>
                <circle cx="122" cy="122" r={RING_R} fill="none" stroke="rgba(255,255,255,0.12)" strokeWidth="4"/>
                <circle cx="122" cy="122" r={RING_R} fill="none" stroke="#FFFFFF" strokeWidth="4"
                  strokeDasharray={RING_C} strokeDashoffset={RING_C*(1-frac)}
                  transform="translate(244 0) scale(-1 1) rotate(-90 122 122)"
                  style={{ transition:"stroke-dashoffset .3s linear" }}/>
              </svg>
              <div style={{ width:210, height:210, borderRadius:"50%", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", background:ORANGE, boxShadow:running?`0 0 50px ${ORANGE}55`:"none", transition:"box-shadow .4s" }}>
                <div style={{ color:"#fff", fontWeight:800, fontSize:50, lineHeight:1, letterSpacing:1 }}>{fmt}</div>
                <div style={{ color:"#fff", opacity:0.92, fontSize:16, marginTop:8 }}>{mode==="work"?"工作":"休息"}</div>
              </div>
            </div>

            {/* 模式切换 */}
            <div style={{ display:"flex", gap:12, marginTop:16, width:"100%", opacity:locked?0.55:1, transition:"opacity .2s" }}>
              {[["work","工作"],["break","休息"]].map(([m,label])=>(
                <button key={m} onClick={()=>switchMode(m)} disabled={locked}
                  style={{ flex:1, padding:"8px 0", borderRadius:12, fontWeight:500, background:mode===m?ORANGE:BTN, color:mode===m?"#fff":TEXT_DIM, fontSize:15, cursor:locked?"not-allowed":"pointer", transition:"background .2s, color .2s" }}>
                  {label}
                </button>
              ))}
            </div>

            {/* 控制按钮 */}
            <div style={{ display:"flex", gap:20, marginTop:16 }}>
              {[
                { onClick:togglePlay, label:running?"暂停":"开始", icon: running ? <Pause size={20}/> : <Play size={20} style={{marginLeft:2}}/> },
                { onClick:handleResetClick, label:"重置", icon:<RotateCcw size={19}/> },
                { onClick:toggleMute, label:muted?"取消静音":"静音", icon:muted?<VolumeX size={19}/>:<Volume2 size={19}/>, active:muted },
              ].map(({onClick,label,icon,active},i)=>(
                <button key={i} onClick={onClick} aria-label={label} className="btn-press"
                  style={{ width:52, height:52, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", background:active?ORANGE:BTN, color:active?"#fff":"#E8E6DF" }}>
                  {icon}
                </button>
              ))}
            </div>

            {/* 背景音卡片 */}
            <div style={{ width:"100%", borderRadius:16, padding:16, marginTop:16, background:CARD }}>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", gap:16 }}>
                <span style={{ color:"#E8E6DF", fontSize:14, whiteSpace:"nowrap" }}>背景音</span>
                <div style={{ position:"relative", flex:1, borderRadius:12, background:BTN, height:38, maxWidth:220 }}>
                  <div style={{ position:"absolute", borderRadius:8, top:4, bottom:4, left:noiseType==="rain"?4:"calc(50% + 2px)", width:"calc(50% - 6px)", background:ORANGE, transition:"left .25s cubic-bezier(.4,0,.2,1)" }}/>
                  <div style={{ position:"absolute", inset:0, display:"flex" }}>
                    <button onClick={()=>changeNoise("rain")} style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", color:noiseType==="rain"?"#fff":TEXT_DIM, fontSize:13, background:"transparent", zIndex:1 }}>雨声</button>
                    <button onClick={()=>changeNoise("brown")} style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", color:noiseType==="brown"?"#fff":TEXT_DIM, fontSize:13, background:"transparent", zIndex:1 }}>棕噪音</button>
                  </div>
                </div>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:12, marginTop:12 }}>
                <span style={{ color:TEXT_DIM, fontSize:13, whiteSpace:"nowrap" }}>音量</span>
                <input type="range" min="0" max="1" step="0.01" value={volume} onChange={e=>setVolume(parseFloat(e.target.value))}
                  style={{ width:"100%", accentColor:"#fff", height:4 }}/>
              </div>
            </div>

            {/* 时间设置卡片 */}
            <div style={{ width:"100%", borderRadius:16, padding:16, marginTop:12, background:CARD }}>
              <div style={{ display:"flex", gap:8, marginBottom:16 }}>
                {[["25:5",25,5],["50:10",50,10],["90:20",90,20]].map(([label,w,b])=>(
                  <button key={label} onClick={()=>applyPreset(w,b)} className="btn-press-sm"
                    style={{ flex:1, padding:"6px 16px", borderRadius:12, fontWeight:500, background:BTN, color:"#E8E6DF", fontSize:13, cursor:"pointer", opacity:1, letterSpacing:0.5 }}>
                    {label}
                  </button>
                ))}
              </div>
              <div style={{ display:"flex", gap:12 }}>
                <div style={{ flex:1 }}>
                  <div style={{ color:TEXT_DIM, fontSize:13, marginBottom:6 }}>工作时间（分钟）</div>
                  <input type="number" min="1" max="180" value={workStr} onChange={e=>onWorkChange(e.target.value)} onBlur={()=>setWorkStr(String(workMin))}
                    style={{ width:"100%", borderRadius:12, padding:"8px 12px", outline:"none", background:BTN, color:"#E8E6DF", fontSize:15 }}/>
                </div>
                <div style={{ flex:1 }}>
                  <div style={{ color:TEXT_DIM, fontSize:13, marginBottom:6 }}>休息时间（分钟）</div>
                  <input type="number" min="1" max="180" value={breakStr} onChange={e=>onBreakChange(e.target.value)} onBlur={()=>setBreakStr(String(breakMin))}
                    style={{ width:"100%", borderRadius:12, padding:"8px 12px", outline:"none", background:BTN, color:"#E8E6DF", fontSize:15 }}/>
                </div>
              </div>
            </div>

            {/* 本次统计 */}
            <div style={{ width:"100%", display:"flex", alignItems:"center", justifyContent:"space-between", marginTop:16, padding:"0 4px" }}>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <span style={{ fontSize:22 }}>🍠</span>
                <div>
                  <div style={{ color:TEXT_DIM, fontSize:11 }}>本次完成的番薯钟数</div>
                  <div style={{ color:"#E8E6DF", fontWeight:800, fontSize:22, lineHeight:1.1 }}>{count}</div>
                </div>
              </div>
              <div style={{ textAlign:"right" }}>
                <div style={{ color:TEXT_DIM, fontSize:11 }}>总时长</div>
                <div style={{ color:"#E8E6DF", fontWeight:800, fontSize:22, lineHeight:1.1, whiteSpace:"nowrap" }}>{fmtTotalCN(totalMin)}</div>
              </div>
            </div>

            {/* 历史记录 */}
            <div style={{ width:"100%", borderRadius:16, marginTop:12, marginBottom:16, background:CARD }}>
              <button onClick={()=>{playClick();setShowHistory(s=>!s);}}
                style={{ width:"100%", display:"flex", alignItems:"center", justifyContent:"space-between", padding:"12px 16px", color:"#E8E6DF", fontSize:14, background:"transparent" }}>
                <span>历史记录</span>
                {showHistory ? <ChevronUp size={17} color={TEXT_DIM}/> : <ChevronDown size={17} color={TEXT_DIM}/>}
              </button>
              {showHistory && (
                <div style={{ padding:"0 16px 12px" }}>
                  {history.length===0 ? (
                    <div style={{ textAlign:"center", padding:"12px 0", color:TEXT_DIM, fontSize:13 }}>还没有完成的番薯钟，开始第一个吧 🍠</div>
                  ) : (
                    <>
                      <div style={{ maxHeight:180, overflowY:"auto" }}>
                        {history.map((h,i)=>(
                          <div key={i} style={{ display:"flex", alignItems:"center", gap:12, padding:"8px 0", borderTop:i===0?"none":`1px solid ${BTN}` }}>
                            <div style={{ display:"flex", alignItems:"center", justifyContent:"center", minWidth:44 }}>
                              <span style={{ color:"#E8E6DF", fontSize:28, fontWeight:800, lineHeight:1 }}>{fmtDuration(h.min)}</span>
                            </div>
                            <div style={{ flex:1, minWidth:0 }}>
                              <div style={{ color:"#E8E6DF", fontSize:13, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{h.task}</div>
                              <div style={{ color:TEXT_DIM, fontSize:11, marginTop:1 }}>{fmtShortDate(h.date,h.time)}</div>
                            </div>
                          </div>
                        ))}
                      </div>
                      <button onClick={clearHistory}
                        style={{ width:"100%", display:"flex", alignItems:"center", justifyContent:"center", gap:4, marginTop:8, padding:"8px 0", borderRadius:12, background:BTN, color:TEXT_DIM, fontSize:12 }}>
                        <Trash2 size={12}/> 清空历史记录
                      </button>
                    </>
                  )}
                </div>
              )}
            </div>
          </div>

          {/* 重置确认弹窗 */}
          {showResetConfirm && (
            <div onClick={cancelReset} style={{ position:"fixed", inset:0, display:"flex", alignItems:"center", justifyContent:"center", background:"rgba(0,0,0,0.55)", zIndex:1000 }}>
              <div onClick={e=>e.stopPropagation()} style={{ borderRadius:16, padding:24, display:"flex", flexDirection:"column", alignItems:"center", gap:16, background:CARD, width:280, boxShadow:"0 8px 40px rgba(0,0,0,0.5)" }}>
                <div style={{ fontSize:32 }}>⏱️</div>
                <div style={{ textAlign:"center" }}>
                  <div style={{ color:"#E8E6DF", fontWeight:700, fontSize:16, marginBottom:6 }}>确定要重置吗？</div>
                  <div style={{ color:TEXT_DIM, fontSize:13 }}>当前进度将会清空。</div>
                </div>
                <div style={{ display:"flex", gap:12, width:"100%" }}>
                  <button onClick={cancelReset} style={{ flex:1, padding:"8px 0", borderRadius:12, fontWeight:500, background:BTN, color:TEXT_DIM, fontSize:14 }}>取消</button>
                  <button onClick={confirmReset} style={{ flex:1, padding:"8px 0", borderRadius:12, fontWeight:500, background:ORANGE, color:"#fff", fontSize:14 }}>确认重置</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<PomodoroApp/>);
  </script>
</body>
</html>
